<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;--bg2:#0d1117;--bg3:#131a24;
  --card:#161d2b;--card2:#1c2535;
  --border:#1e2d42;--border2:#253347;
  --or:#f97316;--or2:#ea580c;
  --gold:#f59e0b;--gold2:#d97706;
  --green:#10b981;--green2:#059669;
  --red:#ef4444;--red2:#dc2626;
  --blue:#3b82f6;--purple:#a855f7;--cyan:#06b6d4;
  --t:#e2e8f0;--t2:#94a3b8;--t3:#64748b;
  --r:14px;
}
html{-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{background:var(--bg);color:var(--t);font-family:'Outfit',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── LAYOUT ── */
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.content{flex:1;padding-bottom:72px}
.page{padding:14px}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(8,12,22,.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;z-index:300;padding-bottom:env(safe-area-inset-bottom,0)}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px 9px;gap:2px;font-size:10px;font-weight:700;color:var(--t3);background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;letter-spacing:.3px;text-transform:uppercase;transition:color .15s}
.bi.act{color:var(--or)}
.bi-ico{font-size:20px;line-height:1}

/* ── STICKY HEADER ── */
.sh{position:sticky;top:0;z-index:200;background:rgba(6,8,15,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 14px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.info-bar{border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:11px;line-height:1.6}
.info-blue{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);color:var(--blue)}
.info-gold{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);color:var(--gold)}
.info-green{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);color:var(--green)}
.info-red{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);color:var(--red)}
.info-or{background:rgba(249,115,22,.07);border:1px solid rgba(249,115,22,.2);color:var(--or)}

/* ── MATCH CARD ── */
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:border-color .15s;position:relative;overflow:hidden;margin-bottom:10px}
.mc:active{transform:scale(.99)}
.mc.live{border-color:rgba(239,68,68,.5)}
.mc.live::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);animation:sweep 2s linear infinite}
@keyframes sweep{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.mc.locked{opacity:.7;border-style:dashed}
.mc.done{opacity:.6}
.mc-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.mc-team{flex:1;text-align:center}
.mc-code{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;line-height:1}
.mc-name{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.mc-vs{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--t3);background:var(--bg3);padding:4px 8px;border-radius:6px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;flex-shrink:0}
.b-live{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.b-up{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.b-done{background:rgba(100,116,139,.08);color:var(--t3);border:1px solid var(--border)}
.b-lock{background:rgba(239,68,68,.08);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.b-green{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.b-gold{background:rgba(245,158,11,.1);color:var(--gold);border:1px solid rgba(245,158,11,.3)}
.b-or{background:rgba(249,115,22,.12);color:var(--or);border:1px solid rgba(249,115,22,.3)}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-r{background:var(--red);animation:blink .8s infinite}
.dot-g{background:var(--green)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Outfit',sans-serif;transition:all .15s;-webkit-tap-highlight-color:transparent}
.bfull{width:100%}
.bor{background:var(--or);color:#fff}.bor:active{background:var(--or2)}.bor:disabled{background:var(--border2);color:var(--t3);cursor:not-allowed}
.bgreen{background:var(--green2);color:#fff}
.bred{background:var(--red2);color:#fff}
.bblue{background:var(--blue);color:#fff}
.bghost{background:transparent;color:var(--t2);border:1px solid var(--border2)}.bghost:active{border-color:var(--or);color:var(--or)}
.bsm{padding:6px 11px;font-size:12px;border-radius:8px}
.bxs{padding:4px 8px;font-size:11px;border-radius:6px}

/* ── TABS ── */
.tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;gap:2px;margin-bottom:12px}
.tab{flex:1;padding:7px 4px;border-radius:7px;border:none;background:none;color:var(--t3);font-size:11px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;text-transform:uppercase;letter-spacing:.3px;transition:all .2s}
.tab.act{background:var(--card2);color:var(--t);box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* ── INPUTS ── */
.inp{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--t);font-size:14px;font-family:'Outfit',sans-serif;width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--or)}
.inp::placeholder{color:var(--t3)}
.inpl{font-size:11px;font-weight:700;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;display:block}

/* ── PLAYER CARD ── */
.pc{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .15s;margin-bottom:5px;position:relative}
.pc:active{transform:scale(.99)}
.pc.sel{border-color:var(--or);background:rgba(249,115,22,.06)}
.pc.cap{border-color:var(--gold);background:rgba(245,158,11,.07)}
.pc.vcap{border-color:var(--cyan);background:rgba(6,182,212,.07)}
.pn{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.pm{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:5px;margin-top:2px;flex-wrap:wrap}
.rp{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:800;letter-spacing:.4px}
.rp-wk{background:rgba(168,85,247,.2);color:var(--purple);border:1px solid rgba(168,85,247,.3)}
.rp-bat{background:rgba(59,130,246,.2);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.rp-ar{background:rgba(16,185,129,.2);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.rp-bowl{background:rgba(249,115,22,.2);color:var(--or);border:1px solid rgba(249,115,22,.3)}
.cbadge{padding:2px 5px;border-radius:3px;font-size:9px;font-weight:800}
.cb-c{background:var(--gold);color:#000}
.cb-vc{background:var(--cyan);color:#000}
.team-stripe{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0}

/* ── PICK COUNTER ── */
.pick-bar{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.rct{text-align:center}
.rct .rv{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.rct .rl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
.rct.ok .rv{color:var(--green)}
.rct.bad .rv{color:var(--red)}

/* ── SCORE TABLE ── */
.sc-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:0}
.sc-tbl th{background:rgba(249,115,22,.12);color:var(--or);font-weight:700;font-size:10px;text-transform:uppercase;padding:7px 8px;text-align:left}
.sc-tbl td{padding:7px 8px;border-bottom:1px solid var(--border)}
.sc-tbl tr:nth-child(even) td{background:var(--bg3)}
.sc-tbl tr.hi td{background:rgba(245,158,11,.07);font-weight:700}
.sc-tbl .n{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700}
.sc-tbl .pos{color:var(--green)}.sc-tbl .neg{color:var(--red)}

/* ── LEADERBOARD ── */
.lbr{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);margin-bottom:5px}
.lbr.r1{border-color:var(--gold);background:rgba(245,158,11,.05)}
.lbr.r2{border-color:#6b7280;background:rgba(107,114,128,.04)}
.lbr.r3{border-color:#b45309}
.lbr.me{box-shadow:0 0 0 2px rgba(249,115,22,.4)}
.lrank{font-family:'Bebas Neue',sans-serif;font-size:22px;width:26px;text-align:center;flex-shrink:0}

/* ── AUTH ── */
.auth-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 0%,rgba(249,115,22,.2),transparent 60%),var(--bg)}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.team-opt{border:1px solid var(--border2);border-radius:10px;padding:11px 8px;text-align:center;cursor:pointer;transition:all .2s;background:var(--card)}
.team-opt.taken{opacity:.35;cursor:not-allowed}
.team-opt.picked{border-color:var(--or);background:rgba(249,115,22,.1)}

/* ── TOAST ── */
.tw{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:7px;align-items:center;pointer-events:none;width:90%;max-width:360px}
.toast{padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;animation:tin .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.5);text-align:center}
.ts{background:var(--green2)}.te{background:var(--red2)}.ti{background:var(--blue)}
@keyframes tin{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── MISC ── */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.prog{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.progf{height:100%;background:linear-gradient(90deg,var(--or),var(--gold));border-radius:2px;transition:width .4s}
.fd{font-family:'Bebas Neue',sans-serif;letter-spacing:1px}
.fm{font-family:'JetBrains Mono',monospace}
.sl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);display:block;margin-bottom:7px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;background:var(--bg3);border:1px solid var(--border);color:var(--t2);font-weight:600}
.scr{animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 20px;text-align:center;gap:10px;color:var(--t3)}
.back-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;transition:border-color .15s}
.back-btn:hover{border-color:var(--or)}
.live-pts-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--green);font-weight:700;font-family:'JetBrains Mono',monospace}
.pts-pos{color:var(--green)}.pts-neg{color:var(--red)}
</style>
</head>

// Track hits per key per day in localStorage (instant, no async)
function _hitKey(k){ // k = first 8 chars

function _getHits(k){ // k = first 8 chars

// Pick the best available key — lowest hits, not exhausted
function _pickBestKey(){
  let best=null, bestHits=999;
  for(let i=0;i<_keyPool.length;i++){
    const h=_getHits(_keyPool[i].key.slice(0,8));
    if(h<CREDIT_LIMIT&&h<bestHits){bestHits=h;best=i;}

  if(best===null){

    let minH=999;
    _keyPool.forEach((k,i)=>{const h=_getHits(k.key.slice(0,8));if(h<minH){minH=h;best=i;}});

}

// Historical average Dream11 pts (IPL 2025 season averages, approx)
// ── Player Stats Cache ─────────────────────────────────────────────────────────
// Source of truth: Firestore `players/{name}` collection
// Fields: totalPts, matchCount, avgPts, lastMatchId, lastMatchPts, lastMatchDate, playedLastMatch
// Updated automatically after every completed match scorecard pull

let _playerStatsCache = {}; // {playerName: {totalPts, matchCount, avgPts, lastMatchId, playedLastMatch}}

async function loadPlayerStats(){
  try{
    const snap = await db.collection('players').get();
    snap.forEach(d => { _playerStatsCache[d.id] = d.data(); });
    console.log('[PlayerStats] Loaded', Object.keys(_playerStatsCache).length, 'player records');

    if(Object.keys(_playerStatsCache).length === 0){
      console.log('[PlayerStats] Empty — auto-backfilling from completed matches...');
      try{
        const lsSnap = await db.collection('live_scores').where('isFinal','==',true).get();
        if(!lsSnap.empty){
          console.log('[PlayerStats] Found',lsSnap.size,'final matches to process');
          for(const d of lsSnap.docs){
            const data=d.data();
            const matchDef=SCHEDULE.find(m=>m.id===d.id);
            const matchDate=matchDef?.date||'';

            // If ptsMap already computed — just backfill player stats
            if(data.ptsMap&&Object.keys(data.ptsMap).length>0){
              const safePts={};
              Object.entries(data.ptsMap).forEach(([k,v])=>{
                if(k&&k!=='_debug') safePts[k]={pts:v.pts||0};
              });
              await updatePlayerStatsFromPtsMap(d.id,matchDate,safePts,false);
              console.log('[PlayerStats] From stored ptsMap:',d.id,'players:',Object.keys(safePts).length);
            } else if(matchDef?.apiMatchId){
              // ptsMap not computed yet — fetch scorecard and compute now
              console.log('[PlayerStats] No ptsMap for',d.id,'— fetching scorecard to compute...');
              try{
                const scoreData=await fetchScorecard(matchDef.apiMatchId);
                if(scoreData){
                  const ptsMap=parseScorecard(scoreData);
                  const safePtsMap={};
                  Object.entries(ptsMap).forEach(([k,v])=>{
                    safePtsMap[k]={pts:v.pts||0,role:v.role||'BAT',team:v.team||'',
                      bat:v.bat||null,bowl:v.bowl||null,bd:v.bd||{}};
                  });
                  if(Object.keys(safePtsMap).length>0){
                    // Save ptsMap to live_scores so it persists
                    await db.collection('live_scores').doc(d.id).set(
                      {ptsMap:safePtsMap,lastScorecardPoll:new Date().toISOString()},{merge:true});
                    await updatePlayerStatsFromPtsMap(d.id,matchDate,safePtsMap,false);
                    console.log('[PlayerStats] Computed+saved:',d.id,'players:',Object.keys(safePtsMap).length);
                  }
                }
              }catch(e){console.warn('[PlayerStats] Scorecard fetch failed for',d.id,e.message);}
            } else {
              console.log('[PlayerStats] No apiMatchId for',d.id,'— cannot auto-compute');
            }
          }
          // Reload cache
          const fresh=await db.collection('players').get();
          fresh.forEach(d=>{_playerStatsCache[d.id]=d.data();});
          console.log('[PlayerStats] ✅ Auto-backfill done —',Object.keys(_playerStatsCache).length,'players');
        } else {
          console.log('[PlayerStats] No final matches yet');
        }
      }catch(e){ console.warn('[PlayerStats] Auto-backfill failed:', e.message); }

}

function getPlayerStats(name){
  if(!name) return {totalPts:0,matchCount:0,avgPts:0,playedLastMatch:false};
  // Cache is keyed by pid — resolve name to pid first
  const pid = resolvePlayerPid(name);
  if(pid && _playerStatsCache[pid]) return _playerStatsCache[pid];
  // Also try direct lookup in case cache was populated with raw names
  if(_playerStatsCache[name]) return _playerStatsCache[name];
  // Last-name fallback
  const last = name.split(' ').pop().toLowerCase();
  const key = Object.keys(_playerStatsCache).find(k =>
    k === last || k.endsWith('_'+last) || PLAYER_REGISTRY[k]?.name.split(' ').pop().toLowerCase()===last
  );
  if(key) return _playerStatsCache[key];
  return {totalPts:0,matchCount:0,avgPts:0,playedLastMatch:false};
}

// Called after every match scorecard pull — updates Firestore players collection
async function updatePlayerStatsFromPtsMap(matchId, matchDate, ptsMap, force=false){
  if(!ptsMap || Object.keys(ptsMap).length === 0) return;
  console.log('[PlayerStats] Updating', Object.keys(ptsMap).length, 'players for', matchId, force?'(force)':'');

  // Use cache as existing data source (fast, no per-player Firestore reads)
  const batch = db.batch();
  let updated = 0;

  for(const [name, data] of Object.entries(ptsMap)){
    if(!name || name === '_debug' || name === '_meta') continue;
    const pts = Math.round((data.pts || 0) * 10) / 10;
    const pid = resolvePlayerPid(name) || name.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/__+/g,'_');
    const ref = db.collection('players').doc(pid);

    // Use cache for existing data (populated from loadPlayerStats)
    const existing = _playerStatsCache[pid] || {totalPts:0, matchCount:0, processedMatches:[]};

    // Idempotency: skip if already processed for this match
    const processed = existing.processedMatches || [];
    if(!force && processed.includes(matchId)) continue;
    if(force && processed.includes(matchId)) continue; // still skip in force — use Reset & Backfill for full redo

    const newTotal = Math.round(((existing.totalPts||0) + pts) * 10) / 10;
    const newCount = (existing.matchCount||0) + 1;
    const newProcessed = [...processed, matchId].slice(-20); // keep last 20 match IDs

    const update = {
      name,
      totalPts: newTotal,
      matchCount: newCount,
      avgPts: Math.round(newTotal / newCount * 10) / 10,
      lastMatchId: matchId,
      lastMatchPts: pts,
      lastMatchDate: matchDate,
      playedLastMatch: pts > 4, // playing XI bonus = 4 pts
      processedMatches: newProcessed,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    };

    batch.set(ref, update, {merge: true});
    _playerStatsCache[name] = {...existing, ...update};
    updated++;
  }

  try{
    await batch.commit();
    console.log('[PlayerStats] ✅ Updated', updated, 'players for', matchId);
  }catch(e){ console.warn('[PlayerStats] Batch failed:', e.message); }
}

// Check if a specific team played in the previous match relative to matchId
// Used to set playedLastMatch correctly per-team
function getTeamLastMatchPlayers(team){
  // Find all players in cache who belong to this team and played in their last match
  const result = {};
  for(const [name, stats] of Object.entries(_playerStatsCache)){
    if(stats.playedLastMatch) result[name] = stats;
  }
  return result;
}
function score(bat,bowl,role){
  // Scoring per Dream11 rules (verified from screenshots)
  let p=0,bd={};
  p+=4;bd['Playing XI']=4;

  // ── Batting ──────────────────────────────────────────────
  if(bat&&(bat.b>0||bat.runs>0)){
    const{runs=0,b=0,f=0,s=0,duck=false}=bat;
    if(runs>0){p+=runs;bd[`Runs(${runs})`]=runs;}
    if(f>0){const x=f*4;p+=x;bd[`4s(${f}×4)`]=x;}
    if(s>0){const x=s*6;p+=x;bd[`6s(${s}×6)`]=x;}
    // Milestone bonuses — century ONLY gets century bonus (no 25/50/75)
    if(runs>=100){p+=16;bd['Century bonus']=16;}
    else if(runs>=75){p+=12;bd['75 bonus']=12;}
    else if(runs>=50){p+=8;bd['50 bonus']=8;}
    else if(runs>=25){p+=4;bd['25 bonus']=4;}
    // Duck: BAT/WK/AR only
    if(duck&&role!=='BOWL'){p-=2;bd['Duck']=-2;}
    // SR: min 10 balls; positive SR thresholds; negative only if SR≤70
    if(b>=10){
      const sr=(runs/b)*100;
      if(sr>170){p+=6;bd['SR>170']=6;}
      else if(sr>150){p+=4;bd['SR 150-170']=4;}
      else if(sr>=130){p+=2;bd['SR 130-150']=2;}
      else if(sr<50){p-=6;bd['SR<50']=-6;}
      else if(sr<60){p-=4;bd['SR 50-59']=-4;}
      else if(sr<=70){p-=2;bd['SR 60-70']=-2;}
      // SR 70-130: no points
    }
  }

  // ── Bowling ──────────────────────────────────────────────
  if(bowl&&bowl.o>0){
    const{o=0,rc=0,w=0,m=0,d=0}=bowl;
    // Wickets (excl. run outs — those don't count for bowling)
    if(w>0){p+=w*30;bd[`Wkts(${w}×30)`]=w*30;}
    // Wicket bonuses
    if(w>=5){p+=12;bd['5W bonus']=12;}
    else if(w>=4){p+=8;bd['4W bonus']=8;}
    else if(w>=3){p+=4;bd['3W bonus']=4;}
    // LBW/Bowled bonus computed per-dismissal in parseScorecard (not here)
    // Maidens
    if(m>0){const x=m*12;p+=x;bd[`Maiden(${m}×12)`]=x;}
    // Dot balls +1 each
    if(d>0){p+=d;bd[`Dots(${d})`]=d;}
    // Economy (min 2 overs)
    if(o>=2){
      const eco=rc/o;
      if(eco<5){p+=6;bd['Eco<5']=6;}
      else if(eco<6){p+=4;bd['Eco 5-5.99']=4;}
      else if(eco<=7){p+=2;bd['Eco 6-7']=2;}
      else if(eco>12){p-=6;bd['Eco>12']=-6;}
      else if(eco>11){p-=4;bd['Eco 11-12']=-4;}
      else if(eco>10){p-=2;bd['Eco 10-11']=-2;}
    }
  }

  return{total:Math.round(p*10)/10,bd};
}

// Parse cricapi.com scorecard into player pts map
// Parse dismissal → fielder + type
function parseDismissal(rawDis){
  if(!rawDis) return {type:'other',fielder:null};
  const d=rawDis.trim().toLowerCase();
  if(d==='not out'||d==='-'||d==='absent'||d==='retired hurt') return {type:'notout',fielder:null};
  if(d.startsWith('lbw')) return {type:'lbw',fielder:null};
  if(d.startsWith('run out')){
    const m=rawDis.match(/\(([^)]+)\)/);
    if(m){
      const inner=m[1];
      const directHit=inner.toLowerCase().startsWith('direct:');
      const nameStr=directHit?inner.slice(7).trim():inner.split('/').slice(-1)[0].trim();
      return {type:'runout',fielder:canonicalName(extractName(nameStr)),directHit};
    }
    return {type:'runout',fielder:null,directHit:false};
  }
  if(d.startsWith('st ')){
    const cleaned=rawDis.replace(/†/g,'').trim();
    const m=cleaned.match(/^st\s+([\w\s]+?)\s+b\s/i);
    if(m) return {type:'stumping',fielder:canonicalName(extractName(m[1].trim()))};
    return {type:'stumping',fielder:null};
  }
  if(d.startsWith('c ')){
    if(d.startsWith('c & b')||d.startsWith('c and b')){
      const m=rawDis.match(/c\s*[&and]+\s*b\s+([\w\s]+)/i);
      return {type:'catch',fielder:m?canonicalName(extractName(m[1].trim())):null,cAndB:true};
    }
    const m=rawDis.match(/^c\s+([\w\s†]+?)\s+b\s/i);
    if(m) return {type:'catch',fielder:canonicalName(extractName(m[1].replace(/†/g,'').trim()))};
    return {type:'catch',fielder:null};
  }
  return {type:'other',fielder:null};
}

function parseScorecard(data){
  const map={};
  const innings=data?.scorecard||data?.score_card||data?.scoreCards||[];
  if(innings.length===0){console.log('[Parse] No innings. keys:',Object.keys(data||{}));return map;}
  console.log('[Parse] Innings:',innings.length);
  innings.forEach(inn=>{
    const teamName=inn.inning?.split(' Inning')[0]||inn.team||'';
    const batArr=inn.batting||inn.bat||[];
    const bowlArr=inn.bowling||inn.bowl||[];
    console.log('[Parse]',inn.inning||inn.team,'bat:',batArr.length,'bowl:',bowlArr.length);

    // Batting + fielding from dismissals
    batArr.forEach(b=>{
      const name=canonicalName(extractName(b.batsman||b.name||b.player));
      if(!name) return;
      const runs=parseInt(b.r||b.runs||0)||0;
      const balls=parseInt(b.b||b.balls||0)||0;
      const f=parseInt(b['4s']||b.fours||0)||0;
      const s=parseInt(b['6s']||b.sixes||0)||0;
      const rawDis=String(b.dismissal||b.how_out||'');
      const notOut=rawDis.toLowerCase()==='not out'||rawDis==='-';
      const duck=runs===0&&!notOut&&balls>0;
      const bat={runs,b:balls,f,s,duck};
      const res=score(bat,null,'BAT');
      if(!map[name]) map[name]={name,team:teamName,role:'BAT',bat:null,bowl:null,field:{c:0,st:0,ro:0},pts:0,bd:{}};
      map[name].bat=bat;
      map[name].pts=Math.round((map[name].pts+res.total)*10)/10;
      Object.entries(res.bd).forEach(([k,v])=>{map[name].bd[k]=(map[name].bd[k]||0)+v;});

      // Fielding credits
      const dis=parseDismissal(rawDis);
      if(dis.fielder&&dis.type!=='notout'&&dis.type!=='other'){
        const fn=dis.fielder;
        if(!map[fn]) map[fn]={name:fn,team:'',role:'AR',bat:null,bowl:null,field:{c:0,st:0,ro:0},pts:0,bd:{}};
        if(!map[fn].field) map[fn].field={c:0,st:0,ro:0};
        let fp=0,fk='';
        if(dis.type==='catch'){fp=8;fk='Catch';map[fn].field.c=(map[fn].field.c||0)+1;}
        else if(dis.type==='stumping'){fp=12;fk='Stumping';map[fn].field.st=(map[fn].field.st||0)+1;}
        else if(dis.type==='runout'){fp=dis.directHit?12:6;fk=dis.directHit?'Run Out (Direct)':'Run Out';map[fn].field.ro=(map[fn].field.ro||0)+1;}
        if(fp>0){
          map[fn].pts=Math.round((map[fn].pts+fp)*10)/10;
          map[fn].bd[fk]=(map[fn].bd[fk]||0)+fp;
        }
      }
    });

    // Bowling + LBW/bowled bonus
    bowlArr.forEach(bw=>{
      const name=canonicalName(extractName(bw.bowler||bw.name||bw.player));
      if(!name) return;
      const oStr=String(bw.o||bw.overs||'0');
      const oFloat=parseFloat(oStr)||0;
      const oInt=Math.floor(oFloat);
      const oBalls=Math.round((oFloat-oInt)*10);
      const o=oInt+(oBalls/6);
      const rc=parseInt(bw.r||bw.runs||0)||0;
      const w=parseInt(bw.w||bw.wickets||0)||0;
      const m=parseInt(bw.m||bw.maidens||0)||0;
      const d=parseInt(bw.wd||bw.dots||bw.dot_balls||0)||0;
      // Count LBW+bowled from this innings for this bowler
      const lbwBld=batArr.filter(b=>{
        const rawDis=String(b.dismissal||b.how_out||'');
        const dl=rawDis.toLowerCase();
        if(!dl.startsWith('lbw')&&!dl.startsWith('b ')) return false;
        const bm=rawDis.match(/b\s+([\w\s]+)$/i);
        if(!bm) return false;
        return canonicalName(extractName(bm[1].trim()))===name;
      }).length;
      const bowl={o,rc,w,m,d};
      const res=score(null,bowl,'BOWL');
      if(!map[name]) map[name]={name,team:teamName,role:'BOWL',bat:null,bowl:null,field:{c:0,st:0,ro:0},pts:0,bd:{}};
      map[name].bowl=bowl;
      map[name].pts=Math.round((map[name].pts+res.total)*10)/10;
      Object.entries(res.bd).forEach(([k,v])=>{map[name].bd[k]=(map[name].bd[k]||0)+v;});
      if(lbwBld>0){
        const x=lbwBld*8;
        map[name].pts=Math.round((map[name].pts+x)*10)/10;
        map[name].bd[`LBW/Bld(${lbwBld}×8)`]=(map[name].bd[`LBW/Bld(${lbwBld}×8)`]||0)+x;
      }
    });
  });
  // 3-catch bonus: +4 if ≥3 catches in the match (one bonus only)
  Object.values(map).forEach(p=>{
    if(p.field&&(p.field.c||0)>=3){
      p.pts=Math.round((p.pts+4)*10)/10;
      p.bd['3 Catch Bonus']=4;
    }
  });
  console.log('[Parse] Players:',Object.keys(map).length);
  return map;
}

function teamTotal(xi,cap,vc,ptsMap){
  let t=0;
  xi.forEach(p=>{
    const resolvedName=normalizeName(p.name,Object.keys(ptsMap));const cp=resolvedName?ptsMap[resolvedName]:null;if(!cp) return;
    const m=cap?.name===p.name?2:vc?.name===p.name?1.5:1;
    t+=cp.pts*m;
  });
  return Math.round(t*10)/10;
}

// Match a player name from API to stored squad name
// Handles: "V Kohli" → "Virat Kohli", "Kohli" → "Virat Kohli", exact match
// ── Player Registry — 255 players, stable PIDs, name resolution ────────────
// pid = stable key used for Firestore. Never changes even if API returns different spelling.
// altNames handles known API variations: "T Head", "V Kohli", "Smaran Ravichandran" etc.
// Resolve any API player name → stable pid
function resolvePlayerPid(apiName){
  if(!apiName) return null;
  const clean=apiName.trim();
  const cleanLow=clean.toLowerCase();
  const entries=Object.entries(PLAYER_REGISTRY);

  // 1. Exact canonical name
  for(const [pid,d] of entries){ if(d.name===clean) return pid; }

  // 2. Alt names (handles "T Head", "Smaran Ravichandran", etc.)
  for(const [pid,d] of entries){
    if(d.altNames&&d.altNames.some(a=>a.toLowerCase()===cleanLow)) return pid;
  }

  // 3. Case-insensitive canonical
  for(const [pid,d] of entries){ if(d.name.toLowerCase()===cleanLow) return pid; }

  // 4. Last-name only — only if unique
  const lastName=clean.split(' ').pop().toLowerCase();
  const byLast=entries.filter(([,d])=>d.name.split(' ').pop().toLowerCase()===lastName);
  if(byLast.length===1) return byLast[0][0];

  // 5. Initial + last: "V Kohli", "T Head", "J Bumrah"
  if(clean.includes(' ')){
    const parts=clean.split(' ');
    const init=parts[0].replace('.','').toLowerCase();
    const last2=parts[parts.length-1].toLowerCase();
    const byInit=entries.filter(([,d])=>{
      const dp=d.name.split(' ');
      return dp[dp.length-1].toLowerCase()===last2 && dp[0].toLowerCase().startsWith(init);
    });
    if(byInit.length===1) return byInit[0][0];
  }

  // 6. Contains search (last resort)
  const byContain=entries.filter(([,d])=>
    d.name.toLowerCase().includes(cleanLow)||cleanLow.includes(d.name.toLowerCase())
  );
  if(byContain.length===1) return byContain[0][0];

  return null;
}

// Get canonical name for any API-returned name
function canonicalName(apiName){
  const pid=resolvePlayerPid(apiName);
  return pid?PLAYER_REGISTRY[pid].name:apiName;
}

// normalizeName — now registry-backed
// Returns the matching key from `keys` array that corresponds to same player as apiName
function normalizeName(apiName,keys){
  if(!apiName) return null;
  // Exact match first
  if(keys.includes(apiName)) return apiName;
  // Registry resolution
  const pid=resolvePlayerPid(apiName);
  if(pid){
    const canonical=PLAYER_REGISTRY[pid].name;
    if(keys.includes(canonical)) return canonical;
    // Check if any key in the array resolves to same pid
    for(const k of keys){ if(resolvePlayerPid(k)===pid) return k; }
  }
  // Last-name fallback
  const lastName=apiName.split(' ').pop().toLowerCase();
  const byLast=keys.filter(k=>k.split(' ').pop().toLowerCase()===lastName);
  if(byLast.length===1) return byLast[0];
  return null;
}

async function fetchCurrentMatches(){
  // Fetch up to 3 pages (offset 0, 25, 50) to find IPL matches
  // Free tier returns up to 25 per page, totalRows tells us how many exist
  const all=[];
  for(let offset=0;offset<=50;offset+=25){
    try{
      const r=await fetch(`${CAPI}/currentMatches?apikey=${CAPI_KEY}&offset=${offset}`);
      const d=await r.json();
      if(d.status!=='success') break;
      const data=d.data||[];
      all.push(...data);
      if(data.length===0||all.length>=(d.info?.totalRows||0)) break;
    }catch(e){break;}
  }
  return all;
}

  const d=await r.json();

  return d.data||[];
}
async function apiGet(endpoint){
  // Auto-rotate to best key before every call
  _ensureBestKey();
  const url=`${CAPI}/${endpoint}&apikey=${CAPI_KEY}`;
  const keyLabel=_keyPool[_activeKeyIdx]?.label||'Key?';
  const r=await fetch(url);
  const d=await r.json();
  // Track hit in localStorage immediately
  const hits=_hitKey(CAPI_KEY.slice(0,8));
  console.log('[API]',keyLabel,'hits='+hits,'→',endpoint.split('?')[0]);
  // Persist to Firestore async
  const today=new Date().toISOString().slice(0,10);
  try{
    db.collection('_meta').doc('hits_'+today+'_'+CAPI_KEY.slice(0,8)).set(
      {key:CAPI_KEY.slice(0,8),label:keyLabel,date:today,
       hits:firebase.firestore.FieldValue.increment(1),
       lastCall:new Date().toISOString()},
      {merge:true}
    );
  }catch(e){}
  // Handle rate limit — auto rotate immediately
  if(d.status!=='success'){
    const reason=String(d.reason||d.message||'API error');
    if(reason.toLowerCase().includes('block')||reason.toLowerCase().includes('limit')||
       reason.toLowerCase().includes('quota')||reason.toLowerCase().includes('exceed')){
      // Force this key to appear exhausted so _pickBestKey skips it
      const today2=new Date().toISOString().slice(0,10);
      try{localStorage.setItem('cvpl_hits_'+today2+'_'+CAPI_KEY.slice(0,8),String(CREDIT_LIMIT+1));}catch(e){}
      const newIdx=_pickBestKey();
      _activeKeyIdx=newIdx;
      CAPI_KEY=_keyPool[newIdx].key;
      console.warn('[API] Rate limited! Auto-rotated to',_keyPool[newIdx].label);
      throw new Error('Rate limited — auto-switched to '+_keyPool[newIdx].label+'. Retry.');
    }
    throw new Error(reason);
  }
  return d;
}

function parseDotBalls(bbbData){
  const dots={};
  if(!bbbData) return dots;
  const add=(name)=>{if(!name)return;const n=extractName(name);if(n)dots[n]=(dots[n]||0)+1;};

  // A delivery is a DOT BALL for the bowler if:
  //   - NOT a wide (charged to bowler, counts as extra run)
  //   - NOT a no-ball (charged to bowler, counts as extra run)
  //   - Runs off the BAT = 0
  //   (Leg byes and byes are extras credited to batting team, NOT off the bat
  //    so the bowler still gets credit for a dot even if 1-4 leg byes/byes ran)
  
  const isDot=(b)=>{
    const wide=!!(b.wides>0||b.extras?.wides>0||b.isWide||b.wide);
    const nb=!!(b.noballs>0||b.extras?.noballs>0||b.isNoBall||b.noBall);
    if(wide||nb) return false; // wides/no-balls = not a dot
    // Runs off the bat only (exclude byes and leg byes)
    const batsmanRuns=parseInt(b.batsmanRuns||b.batRuns||b.runs_off_bat||0)||0;
    // If API gives batsmanRuns directly, use it
    // Otherwise fall back to total runs minus known extras
    const totalRuns=parseInt(b.runs||b.r||0)||0;
    const byes=parseInt(b.byes||b.extras?.byes||0)||0;
    const legbyes=parseInt(b.legbyes||b.leg_byes||b.extras?.legbyes||b.extras?.leg_byes||0)||0;
    const runsOffBat=b.batsmanRuns!==undefined?batsmanRuns:Math.max(0,totalRuns-byes-legbyes);
    return runsOffBat===0; // dot if no runs off bat
  };

  // Format A: innings[].overs[].balls[]
  for(const inn of (bbbData.innings||bbbData.scorecard||[])){
    for(const ov of (inn.overs||inn.over||[])){
      for(const b of (ov.balls||ov.ball||[])){
        if(isDot(b)) add(b.bowlerName||b.bowler||b.bowlerDetails?.name);
      }
    }
  }
  // Format B: flat bbb[]/balls[]
  if(Object.keys(dots).length===0){
    for(const b of (bbbData.bbb||bbbData.balls||[])){
      if(isDot(b)) add(b.bowlerName||b.bowler||b.bName);
    }
  }

  const total=Object.values(dots).reduce((a,b)=>a+b,0);
  console.log('[BBB] Dots:',total,'across',Object.keys(dots).length,'bowlers —',
    Object.entries(dots).slice(0,5).map(([k,v])=>k.split(' ').pop()+'='+v).join(' '));
  return dots;
}

// Global IST formatter — safe to use in any JSX
function fmtIST(d){
  if(!d) return '—';
  try{
    const ms=typeof d==='string'?new Date(d).getTime():
             d&&d.toDate?d.toDate().getTime():
             typeof d==='number'?d:
             d instanceof Date?d.getTime():null;
    if(!ms) return '—';
    return new Date(ms).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'});
  }catch{return '—';}
}

  },[profile.id]);

  const getMatchStatus=(m)=>{
    const lock=new Date(m.lockTime);
    const matchEnd=new Date(lock.getTime()+4.5*3600000);

    // Home: live + next3 + done (most recent first)
    displayList=[
      ...liveMatches,

          <div style={{fontSize:11,color:'var(--t3)',marginTop:2}}>{profile?.cvplEmoji||"🏏"} {profile?.cvplName||"My Team"}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:10,color:'var(--t3)'}}>IPL 2026</div>

        <div style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',

          <span className="dot dot-r"/>

      <div className="tabs" style={{marginBottom:8}}>
        <button className={`tab ${filter==='all'?'act':''}`} onClick={()=>{setFilter('all');setShowAllUpcoming(false);}}>
          {liveMatches.length>0&&<span className="dot dot-r" style={{marginRight:3}}/>}Home
        </button>
        <button className={`tab ${filter==='upcoming'?'act':''}`} onClick={()=>setFilter('upcoming')}>

        </button>
        <button className={`tab ${filter==='done'?'act':''}`} onClick={()=>setFilter('done')}>

        const locked=isLocked(m);

        return(
          <div key={m.id} className={`mc ${status==='live'?'live':''} ${status==='done'?'done':''}`}
            onClick={()=>onNav('match',m)}>

      )}
      <div style={{height:8}}/>
    </div>
  );
}

function Countdown({lock}){
  const[txt,setTxt]=useState('');
  useEffect(()=>{
    const tick=()=>{
      const d=new Date(lock)-new Date();
      if(d<=0){setTxt('');return;}
      const h=Math.floor(d/3600000),mn=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);
      setTxt(h>0?`${h}h ${mn}m`:mn>0?`${mn}m ${s}s`:`${s}s`);
    };
    tick();const iv=setInterval(tick,1000);return()=>clearInterval(iv);
  },[lock]);
  if(!txt) return null;
  const urgent=new Date(lock)-new Date()<600000;
  return(
    <div style={{marginTop:7,fontSize:11,color:urgent?'var(--red)':'var(--t3)',display:'flex',alignItems:'center',gap:4}}>
      🔒 Locks in <strong style={{color:urgent?'var(--red)':'var(--t2)',marginLeft:2}}>{txt}</strong>
    </div>
  );
}

  const matchStarted=isWc?true:now>=getEffectiveLock(match);

  // Re-check time every 30 seconds so board reveals at 7:30 automatically
  useEffect(()=>{

  },[]);

          .catch(()=>setLoadingTeam(false));

    },()=>setLoadingTeam(false));
    // Subscribe to live scores
    const unsubScore=db.collection('live_scores').doc(match.id)
      .onSnapshot(d=>{if(d.exists)setLiveScore(d.data());});

              {' '}<span style={{color:'var(--t3)',fontSize:14}}>vs</span>{' '}
              <span style={{color:TC[match.away]||'var(--blue)'}}>{match.away}</span>
            </div>
            <div style={{fontSize:10,color:'var(--t3)'}}>
              {isWc?match.label:('M'+match.num)} · {match.venue.split(',')[0]}

            </div>
            <MatchTitle matchId={match.id} isAdmin={profile?.isAdmin}/>
          </div>
        </div>
        {liveScore?.scores&&(
          <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>

      <div className="page" style={{paddingTop:10}}>
        <div className="tabs">
          <button className={`tab ${tab==='board'?'act':''}`} onClick={()=>setTab('board')}>
            {matchStarted&&!isWc&&liveScore&&<span className="dot dot-r" style={{marginRight:3}}/>}Board
          </button>
          <button className={`tab ${tab==='scorecard'?'act':''}`} onClick={()=>setTab('scorecard')}>Score</button>
          <button className={`tab ${tab==='stats'?'act':''}`} onClick={()=>setTab('stats')}>Stats</button>
          <button className={`tab ${tab==='myxi'?'act':''}`} onClick={()=>setTab('myxi')}>My XI</button>
          <button className={`tab ${tab==='info'?'act':''}`} onClick={()=>setTab('info')}>Info</button>
          {profile?.isAdmin&&!isWc&&<button className={`tab ${tab==='xi_admin'?'act':''}`}

      </div>
    </div>
  );

// Pre-toss: shows confirmed XI grouped by team with playing/bench status

// Admin: manually mark playing XI per match with one click
function AdminXIMarker({match, liveScore}){
  const[saving,setSaving]=useState('');
  const teams=[match.home,match.away];
  const xi=liveScore?.startingXI||{};
  const xiLog=liveScore?.xiPullLog||null;
  const xiHistory=liveScore?.xiPullHistory||null;
  const[rawDoc,setRawDoc]=useState(null);
  const[showRaw,setShowRaw]=useState(false);
  useEffect(()=>{
    const unsub=db.collection('live_scores').doc(match.id)
      .onSnapshot(d=>{
        setRawDoc(d.exists&&d.data().xiRawPull?d.data().xiRawPull:null);
      },()=>{});
    return unsub;
  },[match.id]);
  const allPlayers=[];
  teams.forEach(team=>(IPL_SQUADS[team]||[]).forEach(p=>allPlayers.push({...p,team})));

  const setStatus=async(playerName,status)=>{
    setSaving(playerName);
    const newXI={...xi};
    if(status===null) delete newXI[playerName];
    else newXI[playerName]=status;
    try{
      await db.collection('live_scores').doc(match.id).set(
        {startingXI:newXI,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},
        {merge:true}
      );
    }catch(e){toast(e.message,'e');}
    setSaving('');
  };

  const clearAll=async()=>{
    await db.collection('live_scores').doc(match.id).set(
      {startingXI:{},updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});

  return(

            <div key={i} style={{background:'rgba(99,102,241,.07)',border:'1px solid rgba(99,102,241,.15)',

          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
            {(IPL_SQUADS[team]||[]).map(p=>{
              const status=xi[p.name]||null;
              const isSaving=saving===p.name;
              return(
                <div key={p.name} style={{
                  display:'flex',alignItems:'center',gap:3,
                  padding:'3px 6px',borderRadius:6,fontSize:9,fontWeight:600,cursor:'pointer',
                  border:'1px solid',transition:'all .15s',
                  background:status==='playing'?'rgba(34,197,94,.15)':status==='impact'?'rgba(249,115,22,.15)':status==='bench'?'rgba(239,68,68,.1)':'var(--bg3)',
                  borderColor:status==='playing'?'rgba(34,197,94,.4)':status==='impact'?'rgba(249,115,22,.4)':status==='bench'?'rgba(239,68,68,.3)':'var(--border)',
                  color:status==='playing'?'var(--green)':status==='impact'?'var(--or)':status==='bench'?'var(--red)':'var(--t2)',
                }}>
                  <span>{p.name}</span>
                  <span style={{color:'var(--t3)',fontSize:8}}>{p.role}</span>
                  {isSaving
                    ?<span className="spin" style={{width:10,height:10}}/>
                    :<div style={{display:'flex',gap:2,marginLeft:2}}>
                      <span title="Playing" style={{cursor:'pointer',opacity:status==='playing'?1:.4}}
                        onClick={()=>setStatus(p.name,status==='playing'?null:'playing')}>✅</span>
                      <span title="Impact sub" style={{cursor:'pointer',opacity:status==='impact'?1:.4}}
                        onClick={()=>setStatus(p.name,status==='impact'?null:'impact')}>⚡</span>
                      <span title="Bench/DNP" style={{cursor:'pointer',opacity:status==='bench'?1:.4}}
                        onClick={()=>setStatus(p.name,status==='bench'?null:'bench')}>❌</span>
                    </div>
                  }
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}


function MatchTitle({matchId, fallback, isAdmin, style={}}){
  const[editing,setEditing]=useState(false);
  const[val,setVal]=useState('');
  const[saving,setSaving]=useState(false);
  const title=getMatchTitle(matchId);

  if(editing) return(
    <div style={{display:'flex',gap:4,alignItems:'center'}}>
      <input className="inp" style={{flex:1,fontSize:12,padding:'3px 7px'}}
        value={val} onChange={e=>setVal(e.target.value)}
        placeholder="e.g. Bumrah's Revenge" autoFocus
        onKeyDown={e=>{if(e.key==='Enter')saveTitle();if(e.key==='Escape')setEditing(false);}}/>
      <button className="btn bsm bor" disabled={saving} onClick={saveTitle}>
        {saving?<span className="spin"/>:'✓'}
      </button>
      <button className="btn bsm bghost" onClick={()=>setEditing(false)}>✕</button>
    </div>
  );

  async function saveTitle(){
    setSaving(true);
    try{await saveMatchTitle(matchId,val.trim());setEditing(false);}
    catch(e){toast(e.message,'e');}
    setSaving(false);
  }

  return(
    <div style={{display:'flex',alignItems:'center',gap:4,...style}}>
      {title
        ?<span style={{fontSize:11,color:'var(--or)',fontStyle:'italic',fontWeight:600}}>{title}</span>
        :isAdmin?<span style={{fontSize:10,color:'var(--t3)'}}>+ add title</span>:null
      }
      {isAdmin&&(
        <button style={{background:'none',border:'none',cursor:'pointer',fontSize:10,
          color:'var(--t3)',padding:'0 2px'}}
          onClick={()=>{setVal(title);setEditing(true);}}>✏️</button>
      )}
    </div>
  );
}


function PlayingXIPreview({xi,match}){
  const teams=[match.home,match.away];
  return(
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
      {teams.map(team=>{
        const squad=(IPL_SQUADS[team]||[]);
        const playing=squad.filter(p=>{
          const k=Object.keys(xi);
          const res=normalizeName(p.name,k);
          return res&&xi[res]==='playing';
        });
        const impact=squad.filter(p=>{
          const k=Object.keys(xi);
          const res=normalizeName(p.name,k);
          return res&&xi[res]==='impact';
        });
        const bench=squad.filter(p=>{
          const k=Object.keys(xi);
          const res=normalizeName(p.name,k);
          return res&&xi[res]==='bench';
        });
        return(
          <div key={team} style={{background:'var(--bg2)',borderRadius:8,padding:'8px'}}>
            <div style={{fontWeight:700,fontSize:11,color:TC[team]||'var(--or)',marginBottom:4}}>
              {team}
            </div>
            {playing.length===0&&impact.length===0?(
              <div style={{fontSize:9,color:'var(--t3)'}}>XI not parsed yet</div>
            ):(
              <>
                {playing.map(p=>(
                  <div key={p.name} style={{fontSize:9,display:'flex',alignItems:'center',gap:3,marginBottom:2}}>
                    <span style={{color:'var(--green)',flexShrink:0}}>✅</span>
                    <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {p.name}
                    </span>
                  </div>
                ))}
                {impact.map(p=>(
                  <div key={p.name} style={{fontSize:9,display:'flex',alignItems:'center',gap:3,marginBottom:2}}>
                    <span style={{color:'var(--or)',flexShrink:0}}>⚡</span>
                    <span>{p.name} <span style={{color:'var(--t3)'}}>impact</span></span>
                  </div>
                ))}
                {bench.slice(0,2).map(p=>(
                  <div key={p.name} style={{fontSize:9,display:'flex',alignItems:'center',gap:3,
                    marginBottom:2,opacity:0.5}}>
                    <span style={{color:'var(--red)',flexShrink:0}}>❌</span>
                    <span style={{textDecoration:'line-through'}}>{p.name}</span>
                  </div>
                ))}
              </>
            )}
          </div>
        );
      })}
    </div>
  );
}


function BoardTab({match,profile,liveScore,isWc,matchStarted}){
  const[submittedTeams,setSubmittedTeams]=useState([]);
  const[scoredTeams,setScoredTeams]=useState([]);
  const[loading,setLoading]=useState(true);
  const[expanded,setExpanded]=useState(null);
  const timerRef=useRef(null);
  const TOTAL=12;
  const mult=match.mult||1;
  const now=new Date();
  const lockTime=new Date(match.lockTime);
  const matchEnd=new Date(lockTime.getTime()+5*3600000);
  const isLive=now>=lockTime&&now<matchEnd;
  const isDone=now>=matchEnd;
  const showPicks=isWc||matchStarted;

  useEffect(()=>{
    const unsub=db.collection('teams').where('matchId','==',match.id)
      .onSnapshot(snap=>{
        const byTeam={};
        snap.docs.forEach(d=>{
          const data=d.data();
          const teamKey=data.cvplId||data.userId||'';
          if(!teamKey) return;
          const saved=data.savedAt&&data.savedAt.toDate?data.savedAt.toDate():null;
          // Keep only the latest save per cvplId
          if(!byTeam[teamKey]||saved>(byTeam[teamKey].savedAt||0)){
            byTeam[teamKey]={uid:data.userId||'',cvplId:teamKey,
              cvplName:data.cvplName||'?',cvplEmoji:data.cvplEmoji||'🏏',
              savedAt:saved,
              captain:data.players?data.players.find(p=>p.isC)?.name||null:null,
              vc:data.players?data.players.find(p=>p.isVC)?.name||null:null};
          }
        });
        const rows=Object.values(byTeam).sort((a,b)=>(a.savedAt||0)-(b.savedAt||0));
        setSubmittedTeams(rows);
      },()=>{});
    return unsub;
  },[match.id]);

  useEffect(()=>{
    timerRef.current=setTimeout(()=>setLoading(false),5000);
    const unsub=db.collection('match_pts').where('matchId','==',match.id)
      .onSnapshot(snap=>{
        clearTimeout(timerRef.current);
        // Deduplicate by cvplId — keep highest pts entry per team
        const byTeamPts={};
        snap.docs.forEach(d=>{
          const data=d.data();
          const key=data.cvplId||data.userId||d.id;
          if(!byTeamPts[key]||(data.pts||0)>(byTeamPts[key].pts||0)){
            byTeamPts[key]={...data,uid:data.userId};
          }
        });
        const rows=Object.values(byTeamPts).sort((a,b)=>(b.pts||0)-(a.pts||0));
        setScoredTeams(rows.map((r,i)=>({...r,rank:i+1})));
        setLoading(false);
      },err=>{clearTimeout(timerRef.current);setLoading(false);});
    return()=>{unsub();clearTimeout(timerRef.current);};
  },[match.id]);

  const rc=r=>r===1?'r1':r===2?'r2':r===3?'r3':'';
  const squadPullTime=liveScore?liveScore.squadPullTime:null;
  const lastPullAt=liveScore?liveScore.updatedAt:null;
  const pollCount=liveScore?liveScore.scorePollCount||0:0;

  const fmtIST=(d)=>{
    if(!d) return '—';
    try{
      const ms=typeof d==='string'?new Date(d).getTime():
               d&&d.toDate?d.toDate().getTime():
               typeof d==='number'?d:null;
      if(!ms) return '—';
      return new Date(ms).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'});
    }catch(e){return '—';}
  };

  return(
    <div>
      {isWc&&<div className="info-bar info-gold" style={{marginBottom:8}}>🏆 {match.label} · {mult}× league pts · Final scores</div>}

      {!isWc&&isLive&&(
        <div style={{background:'rgba(16,185,129,.07)',border:'1px solid rgba(16,185,129,.25)',borderRadius:10,padding:'10px 14px',marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <span style={{fontSize:12,fontWeight:700,color:'var(--green)',display:'flex',alignItems:'center',gap:6}}>
              <span className="dot dot-r"/>LIVE · Updates every 10 min
            </span>
            <span className="badge b-green" style={{fontSize:10}}>{pollCount} pulls</span>
          </div>
          <div style={{fontSize:10,color:'var(--t3)',borderTop:'1px solid var(--border)',paddingTop:6}}>
            {squadPullTime
              ?<span>📋 Playing XI ✓ pulled at <strong style={{color:'var(--green)'}}>{fmtIST(squadPullTime)} IST</strong></span>
              :<span>📋 Playing XI: pulled from API pre-toss</span>}
          </div>
          {lastPullAt&&(
            <div style={{fontSize:10,color:'var(--t3)',marginTop:4,display:'flex',gap:14}}>
              <span>Last score: <strong style={{color:'var(--t2)'}}>{fmtIST(lastPullAt)} IST</strong></span>
            </div>
          )}
        </div>
      )}

      {!isWc&&isDone&&<div className="info-bar info-gold">✅ Match ended · Final scores · {pollCount} total score pulls</div>}

      {!isWc&&!matchStarted&&(
        <div>
          {/* XI Status — critical pre-toss */}
          {liveScore?.startingXI&&Object.keys(liveScore.startingXI||{}).length>0?(
            <div style={{background:'rgba(34,197,94,.1)',border:'2px solid rgba(34,197,94,.4)',
              borderRadius:12,padding:'12px 14px',marginBottom:10}}>
              <div style={{fontWeight:800,fontSize:14,color:'var(--green)',marginBottom:6}}>
                ✅ Playing XI Confirmed — {Object.keys(liveScore.startingXI||{}).length} players
              </div>
              <div style={{fontSize:10,color:'var(--t3)',marginBottom:8}}>
                Pulled {fmtIST(squadPullTime)} IST · Go to <strong>Build XI</strong> to pick your team
              </div>
              {/* Show which of MY players are confirmed */}
              <PlayingXIPreview xi={liveScore.startingXI} match={match}/>
            </div>
          ):(
            <div style={{background:'rgba(249,115,22,.06)',border:'1px solid rgba(249,115,22,.2)',
              borderRadius:10,padding:'10px 14px',marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--or)',marginBottom:4}}>
                ⏳ Waiting for Playing XI
              </div>
              <div style={{fontSize:10,color:'var(--t3)',lineHeight:1.9}}>
                🔒 Lock: <strong style={{color:'var(--or)'}}>{fmtIST(getEffectiveLock(match))} IST</strong><br/>
                👥 Auto-pull: 20 min & 10 min before toss<br/>
                📋 Or ask admin to manually pull from Match Log
              </div>
            </div>
          )}
        </div>
      )}

      {/* Submission tracker — only before match starts */}
      {!matchStarted&&<div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px',marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <span style={{fontSize:12,fontWeight:700}}>Teams Submitted</span>
          <span className="fm" style={{fontSize:22,fontWeight:800,color:submittedTeams.length===TOTAL?'var(--green)':'var(--or)'}}>
            {submittedTeams.length}/{TOTAL}
          </span>
        </div>
        <div style={{background:'var(--border)',borderRadius:4,height:5,marginBottom:8,overflow:'hidden'}}>
          <div style={{height:'100%',borderRadius:4,transition:'width .5s',
            background:'linear-gradient(90deg,var(--or),var(--gold))',
            width:`${Math.round((submittedTeams.length/TOTAL)*100)}%`}}/>
        </div>
        {submittedTeams.length===0?(
          <div style={{fontSize:11,color:'var(--t3)',textAlign:'center',padding:'6px 0'}}>No teams submitted yet — be first!</div>
        ):(
          submittedTeams.map((t,i)=>(
            <div key={t.uid} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',
              borderBottom:i<submittedTeams.length-1?'1px solid var(--border)':'none'}}>
              <span style={{fontSize:15,flexShrink:0}}>{t.cvplEmoji}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:t.uid===profile.id?700:500,
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {t.cvplName}
                  {t.uid===profile.id&&<span style={{fontSize:9,color:'var(--or)',marginLeft:4}}>YOU</span>}
                </div>
                {showPicks&&t.captain&&(
                  <div style={{fontSize:9,color:'var(--t3)'}}>
                    C: {t.captain.split(' ').slice(-1)[0]} · VC: {(t.vc||'?').split(' ').slice(-1)[0]}
                  </div>
                )}
              </div>
              <span style={{fontSize:9,color:'var(--t3)',flexShrink:0}}>{fmtIST(t.savedAt)}</span>
            </div>
          ))
        )}
        {!showPicks&&submittedTeams.length>0&&(
          <div style={{marginTop:8,fontSize:10,color:'var(--t3)',textAlign:'center',
            borderTop:'1px solid var(--border)',paddingTop:8}}>
            🔒 Player picks revealed at toss time
          </div>
        )}
      </div>}

      {/* Fantasy leaderboard — only after match starts */}
      {matchStarted&&(
        <div>
          <div style={{fontSize:11,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:.6,marginBottom:8}}>
            Fantasy Leaderboard
          </div>
          {liveScore&&liveScore.status&&(
            <div style={{fontSize:11,color:'var(--t2)',background:'var(--bg3)',borderRadius:8,padding:'8px 12px',marginBottom:10}}>
              {liveScore.status}
            </div>
          )}
          {loading?(
            <div style={{textAlign:'center',padding:24}}><span className="spin"/></div>
          ):scoredTeams.length===0?(
            <div className="empty" style={{padding:'16px 0'}}>
              <div style={{fontSize:32}}>📡</div>
              <div style={{fontSize:13,fontWeight:600}}>Waiting for first pts compute</div>
              <div style={{fontSize:11,color:'var(--t3)',marginTop:4}}>
                Scores pull every 10 min · Pts computed at match end
              </div>
              <div style={{fontSize:10,color:'var(--t3)',marginTop:4}}>
                {submittedTeams.length} team{submittedTeams.length!==1?'s':''} submitted
              </div>
            </div>
          ):(
            <div>
              {scoredTeams.map(row=>{
                const isMe=row.uid===profile.id;
                const exp=expanded===row.uid;
                return(
                  <div key={row.uid}>
                    <div className={`lbr ${rc(row.rank)} ${isMe?'me':''}`}
                      style={{cursor:'pointer'}} onClick={()=>setExpanded(exp?null:row.uid)}>
                      <div className="lrank" style={{color:row.rank===1?'var(--gold)':row.rank===2?'#9ca3af':row.rank===3?'#cd7f32':'var(--t3)'}}>
                        {row.rank===1?'🥇':row.rank===2?'🥈':row.rank===3?'🥉':row.rank}
                      </div>
                      <div style={{fontSize:18,flexShrink:0}}>{row.cvplEmoji||'🏏'}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:isMe?700:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                          {row.cvplName||'?'}{isMe&&<span style={{fontSize:9,color:'var(--or)',marginLeft:4}}>YOU</span>}
                        </div>
                        {row.rank<=5&&mult>1&&<div style={{fontSize:10,color:'var(--gold)'}}>+{leaguePts(row.rank,mult)} league pts</div>}
                        <div style={{fontSize:9,color:'var(--t3)'}}>
                          C: {(row.detail||[]).find(p=>p.mult===2)?.name?.split(' ').slice(-1)[0]||'?'}
                        </div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div className="fm" style={{fontSize:20,fontWeight:800,color:'var(--or)'}}>{(row.pts||0).toFixed(1)}</div>
                        <div style={{fontSize:9,color:'var(--t3)'}}>{exp?'▲':'▼'} picks</div>
                      </div>
                    </div>
                    {exp&&(
                      <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'0 0 10px 10px',
                        padding:'10px 12px',marginTop:-4,marginBottom:6}}>
                        <div style={{fontSize:11,color:'var(--t3)',marginBottom:8}}>
                          C: {(row.detail||[]).find(p=>p.mult===2)?.name||'?'} ·
                          VC: {(row.detail||[]).find(p=>p.mult===1.5)?.name||'?'}
                        </div>
                        <table className="sc-tbl" style={{marginBottom:0}}>
                          <thead><tr><th>Player</th><th>Role</th><th style={{textAlign:'right'}}>Base</th><th style={{textAlign:'center'}}>x</th><th style={{textAlign:'right'}}>Pts</th></tr></thead>
                          <tbody>
                            {(row.detail||[]).sort((a,b)=>(b.final||0)-(a.final||0)).map((p,i)=>(
                              <tr key={p.name} className={i===0?'hi':''}>
                                <td style={{maxWidth:110,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:11}}>
                                  {(p.name||'').split(' ').slice(-1)[0]}
                                  {p.mult===2&&<span className="cb-c cbadge" style={{marginLeft:4}}>C</span>}
                                  {p.mult===1.5&&<span className="cb-vc cbadge" style={{marginLeft:4}}>VC</span>}
                                </td>
                                <td><span className={`rp rp-${(p.role||'bat').toLowerCase()}`}>{p.role||'?'}</span></td>
                                <td className="n">{p.base||0}</td>
                                <td className="n" style={{color:p.mult>1?'var(--gold)':'var(--t3)'}}>{p.mult}x</td>
                                <td className={`n ${(p.final||0)>0?'pos':''}`}>{p.final||0}</td>
                              </tr>
                            ))}
                            <tr style={{background:'rgba(249,115,22,.08)'}}>
                              <td colSpan={4} style={{fontWeight:700,color:'var(--or)'}}>TOTAL</td>
                              <td className="n" style={{fontWeight:800,color:'var(--or)'}}>{(row.pts||0).toFixed(1)}</td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                );
              })}
              <div style={{marginTop:8,fontSize:11,color:'var(--t3)',textAlign:'center'}}>Tap any row to see player picks and scores</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function ScorecardTab({match,liveScore}){
