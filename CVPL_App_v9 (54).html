function ScorecardUploadPanel(){
  const[raw,setRaw]=useState('');
  const[parsed,setParsed]=useState(null);
  const[error,setError]=useState('');
  const[applying,setApplying]=useState(false);
  const[result,setResult]=useState('');

  const tryParse=()=>{
    setError('');setParsed(null);setResult('');
    try{
      const clean=raw.trim().replace(/^```json\s*/,'').replace(/\s*```$/,'');
      const obj=JSON.parse(clean);
      // Validate structure
      if(!obj.matchId) throw new Error('Missing matchId field');
      if(!Array.isArray(obj.innings)||obj.innings.length===0) throw new Error('Missing or empty innings array');
      let playerCount=0;
      obj.innings.forEach((inn,i)=>{
        if(!inn.team) throw new Error(`innings[${i}] missing team`);
        playerCount+=(inn.batting||[]).length+(inn.bowling||[]).length;
      });
      setParsed(obj);
      setError('');
    }catch(e){
      setError('Parse error: '+e.message);
    }
  };

  const applyToMatch=async()=>{
    if(!parsed) return;
    setApplying(true);setResult('');
    try{
      const matchDef=SCHEDULE.find(m=>m.id===parsed.matchId);
      if(!matchDef) throw new Error('Match '+parsed.matchId+' not in SCHEDULE');

      // Fetch current live_scores doc
      const lsDoc=await db.collection('live_scores').doc(parsed.matchId).get();
      const lsData=lsDoc.exists?lsDoc.data():{};
      const existingPtsMap={...(lsData.ptsMap||{})};

      console.log('[Upload] Applying to',parsed.matchId,'existing players:',Object.keys(existingPtsMap).length);

      let dotUpdates=0,fieldingUpdates=0,newPlayers=0;

      // Process each inning
      parsed.innings.forEach(inn=>{
        // ── Batting: extract dismissals for fielding ──────
        (inn.batting||[]).forEach(b=>{
          const name=canonicalName(b.name);
          if(!name) return;

          // Apply dismissal fielding credits
          if(b.dismissal){
            const dis=parseDismissal(b.dismissal);
            if(dis.fielder&&dis.type!=='notout'&&dis.type!=='other'){
              const fn=dis.fielder;
              if(!existingPtsMap[fn]){
                existingPtsMap[fn]={name:fn,pts:4,role:'AR',team:inn.team,bd:{'Playing XI':4},field:{c:0,st:0,ro:0}};
                newPlayers++;
              }
              if(!existingPtsMap[fn].field) existingPtsMap[fn].field={c:0,st:0,ro:0};
              let fp=0,fk='';
              if(dis.type==='catch'){fp=8;fk='Catch';existingPtsMap[fn].field.c=(existingPtsMap[fn].field.c||0)+1;}
              else if(dis.type==='stumping'){fp=12;fk='Stumping';existingPtsMap[fn].field.st=(existingPtsMap[fn].field.st||0)+1;}
              else if(dis.type==='runout'){fp=6;fk='Run Out';existingPtsMap[fn].field.ro=(existingPtsMap[fn].field.ro||0)+1;}
              if(fp>0){
                existingPtsMap[fn].pts=Math.round((existingPtsMap[fn].pts+fp)*10)/10;
                existingPtsMap[fn].bd[fk]=(existingPtsMap[fn].bd[fk]||0)+fp;
                fieldingUpdates++;
              }
            }
          }
        });

        // ── Bowling: add dot balls ────────────────────────
        (inn.bowling||[]).forEach(bw=>{
          const name=canonicalName(bw.name);
          if(!name||typeof bw.dots!=='number') return;
          if(!existingPtsMap[name]){
            existingPtsMap[name]={name,pts:4,role:'BOWL',team:inn.team,bd:{'Playing XI':4},bowl:{o:0,rc:0,w:0,m:0,d:0}};
            newPlayers++;
          }
          if(!existingPtsMap[name].bowl) existingPtsMap[name].bowl={o:0,rc:0,w:0,m:0,d:0};
          const oldDots=existingPtsMap[name].bowl.d||0;
          const newDots=bw.dots;
          if(newDots===oldDots) return; // no change
          const dotDiff=newDots-oldDots;
          existingPtsMap[name].bowl.d=newDots;
          // Recalculate bowling pts fully
          const bowl=existingPtsMap[name].bowl;
          const res=score(null,bowl,'BOWL');
          // Also check LBW/bowled from the batting dismissals in this inning
          const lbwBld=(inn.batting||[]).filter(b=>{
            if(!b.dismissal) return false;
            const dl=b.dismissal.toLowerCase();
            if(!dl.startsWith('lbw')&&!dl.startsWith('b ')) return false;
            const bm=b.dismissal.match(/b\s+([\w\s]+)$/i);
            return bm&&canonicalName(bm[1].trim())===name;
          }).length;
          const lbwPts=lbwBld*8;
          // Remove old dot pts, add new
          const oldBd=existingPtsMap[name].bd||{};
          const oldDotPts=oldBd[`Dots(${oldDots})`]||0;
          delete existingPtsMap[name].bd[`Dots(${oldDots})`];
          existingPtsMap[name].pts=Math.round((existingPtsMap[name].pts-oldDotPts)*10)/10;
          // Full pts recalc to be safe
          const batPts=existingPtsMap[name].bat?score(existingPtsMap[name].bat,null,existingPtsMap[name].role||'BAT').total:0;
          const newTotal=Math.round((4+batPts+res.total+lbwPts)*10)/10;
          existingPtsMap[name].pts=newTotal;
          Object.entries(res.bd).forEach(([k,v])=>{existingPtsMap[name].bd[k]=(existingPtsMap[name].bd[k]||0)+v;});
          if(lbwPts>0) existingPtsMap[name].bd[`LBW/Bld(${lbwBld}x8)`]=lbwPts;
          dotUpdates++;
        });
      });

      // Save updated ptsMap
      await db.collection('live_scores').doc(parsed.matchId).set(
        {ptsMap:existingPtsMap,lastUpload:new Date().toISOString(),
         uploadSource:parsed.source||'manual',updatedAt:firebase.firestore.FieldValue.serverTimestamp()},
        {merge:true}
      );

      // Recompute team pts
      const teamsSnap=await db.collection('teams').where('matchId','==',parsed.matchId).get();
      if(!teamsSnap.empty){
        const batch=db.batch();
        teamsSnap.forEach(tdoc=>{
          const team=tdoc.data();
          if(!team.cvplId&&!team.userId) return;
          let total=0;
          const detail=(team.players||[]).map(p=>{
            const res=normalizeName(p.name,Object.keys(existingPtsMap));
            const cp=res?existingPtsMap[res]:null;
            const base=cp?cp.pts:0;
            const mult=p.isC?2:p.isVC?1.5:1;
            const final=Math.round(base*mult*10)/10;
            total+=final;
            return{name:String(p.name),role:String(p.role||'BAT'),base,mult,final};
          });
          total=Math.round(total*10)/10;
          const dk=parsed.matchId+'_'+(team.cvplId||team.userId);
          batch.set(db.collection('match_pts').doc(dk),{
            matchId:String(parsed.matchId),cvplId:String(team.cvplId||''),
            cvplName:String(team.cvplName||''),cvplEmoji:String(team.cvplEmoji||'🏏'),
            pts:total,detail,calculatedAt:firebase.firestore.FieldValue.serverTimestamp(),
          });
        });
        await batch.commit();
      }

      // Update player season stats
      await updatePlayerStatsFromPtsMap(parsed.matchId,matchDef.date,existingPtsMap,true);
      await loadPlayerStats();

      setResult(`✅ Done! Dot updates: ${dotUpdates} · Fielding credits: ${fieldingUpdates} · New players: ${newPlayers}`);
      toast('Upload applied ✓','s');
    }catch(e){
      setResult('❌ '+e.message);
      toast(e.message,'e');
    }
    setApplying(false);
  };

  const SAMPLE=`{
  "matchId": "m07",
  "matchName": "CSK vs PBKS",
  "source": "cricinfo",
  "innings": [
    {
      "team": "PBKS",
      "batting": [
        {"name": "Prabhsimran Singh", "dismissal": "c MS Dhoni b Khaleel Ahmed"},
        {"name": "Shreyas Iyer", "dismissal": "lbw b Anshul Kamboj"},
        {"name": "Shashank Singh", "dismissal": "not out"}
      ],
      "bowling": [
        {"name": "Arshdeep Singh", "dots": 12},
        {"name": "Yuzvendra Chahal", "dots": 9}
      ]
    },
    {
      "team": "CSK",
      "batting": [
        {"name": "Ruturaj Gaikwad", "dismissal": "c Prabhsimran Singh b Arshdeep Singh"}
      ],
      "bowling": [
        {"name": "Yuzvendra Chahal", "dots": 14}
      ]
    }
  ]
}`;

  return(

function PlayersStatsPanel(){
  const[players,setPlayers]=useState([]);
  const[loading,setLoading]=useState(true);
  const[recomputing,setRecomputing]=useState(false);

  useEffect(()=>{
    const unsub=db.collection('players').orderBy('totalPts','desc').limit(100)
      .onSnapshot(snap=>{
        setPlayers(snap.docs.map(d=>({id:d.id,...d.data()})));
        setLoading(false);
      },()=>setLoading(false));
    return unsub;
  },[]);

  // Backfill: recompute all player stats from all completed live_scores docs
  const backfill=async()=>{
    setRecomputing(true);
    try{
      const snap=await db.collection('live_scores').where('isFinal','==',true).get();
      console.log('[Backfill] Found',snap.size,'completed matches');
      for(const d of snap.docs){
        const data=d.data();
        if(!data.ptsMap||Object.keys(data.ptsMap).length===0) continue;
        const matchDef=SCHEDULE.find(m=>m.id===d.id);
        const matchDate=matchDef?.date||data.lastPollTime?.slice(0,10)||'';
        // Reset lastMatchId check for backfill — force update all
        const safePts={};
        Object.entries(data.ptsMap).forEach(([k,v])=>{
          safePts[k]={pts:v.pts||0};
        });
        await updatePlayerStatsFromPtsMap(d.id, matchDate, safePts, true); // force=true for backfill
        console.log('[Backfill] Processed',d.id,'players:',Object.keys(safePts).length);
      }
      await loadPlayerStats(); // refresh cache
      toast('Backfill done! '+snap.size+' matches processed','s');
    }catch(e){toast(e.message,'e');}
    setRecomputing(false);
  };

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:11,color:'var(--t3)'}}>
          {players.length} players tracked · Auto-updates after each match
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <button className="btn bsm bor" disabled={recomputing} onClick={backfill}
            title="Re-accumulate player season pts from stored ptsMap in Firestore">
            {recomputing?<><span className="spin"/> Working...</>:'🔄 Backfill'}
          </button>
          <button className="btn bsm bor" style={{background:'rgba(6,182,212,.1)',borderColor:'var(--cyan)'}}
            disabled={recomputing}
            title="Fetch scorecards from API for all completed matches, recompute pts + team scores"
            onClick={async()=>{
              if(!window.confirm('Fetch scorecards for ALL final matches and recompute everything? (10 credits per match)')) return;
              setRecomputing(true);
              let done=0;
              try{
                const lsSnap=await db.collection('live_scores').where('isFinal','==',true).get();
                for(const doc of lsSnap.docs){
                  const matchDef=SCHEDULE.find(m=>m.id===doc.id);
                  if(!matchDef?.apiMatchId) continue;
                  try{
                    console.log('[FullRecompute] Fetching scorecard for',doc.id);
                    const scoreData=await fetchScorecard(matchDef.apiMatchId);
                    if(!scoreData){console.warn('[FullRecompute] No data for',doc.id);continue;}
                    const ptsMap=parseScorecard(scoreData);
                    const safePtsMap={};
                    Object.entries(ptsMap).forEach(([k,v])=>{
                      safePtsMap[k]={pts:v.pts||0,role:v.role||'BAT',team:v.team||'',
                        bat:v.bat||null,bowl:v.bowl||null,field:v.field||{},bd:v.bd||{}};
                    });
                    if(Object.keys(safePtsMap).length===0){console.warn('[FullRecompute] Empty ptsMap for',doc.id);continue;}
                    await db.collection('live_scores').doc(doc.id).set(
                      {ptsMap:safePtsMap,rawInnings:extractRawInnings(scoreData),
                       lastScorecardPoll:new Date().toISOString()},{merge:true});
                    // Recompute match_pts for all submitted teams
                    const teamsSnap=await db.collection('teams').where('matchId','==',doc.id).get();
                    if(!teamsSnap.empty){
                      const batch=db.batch();
                      teamsSnap.forEach(tdoc=>{
                        const team=tdoc.data();
                        if(!team.cvplId&&!team.userId) return;
                        let total=0;
                        const detail=(team.players||[]).map(p=>{
                          const res=normalizeName(p.name,Object.keys(safePtsMap));
                          const cp=res?safePtsMap[res]:null;
                          const base=cp?cp.pts:0;
                          const mult=p.isC?2:p.isVC?1.5:1;
                          const final=Math.round(base*mult*10)/10;
                          total+=final;
                          return{name:String(p.name),role:String(p.role||'BAT'),base,mult,final};
                        });
                        total=Math.round(total*10)/10;
                        const dk=doc.id+'_'+(team.cvplId||team.userId);
                        batch.set(db.collection('match_pts').doc(dk),{
                          matchId:String(doc.id),cvplId:String(team.cvplId||''),
                          cvplName:String(team.cvplName||''),cvplEmoji:String(team.cvplEmoji||'🏏'),
                          pts:total,detail,calculatedAt:firebase.firestore.FieldValue.serverTimestamp(),
                        });
                      });
                      await batch.commit();
                    }
                    await updatePlayerStatsFromPtsMap(doc.id,matchDef.date,safePtsMap,true);
                    done++;
                  }catch(e){console.warn('[FullRecompute] Error for',doc.id,':',e.message);}
                }
                await loadPlayerStats();
                toast('♻️ Recomputed '+done+' matches ✓','s');
              }catch(e){toast(e.message,'e');}
              setRecomputing(false);
            }}>
            {recomputing?<><span className="spin"/> Working...</>:'♻️ Full Recompute'}
          </button>
          <button className="btn bsm bghost" disabled={recomputing} onClick={async()=>{
            if(!confirm('Delete all player stats and recompute from scratch?')) return;
            setRecomputing(true);
            try{
              // Clear all player docs
              const snap=await db.collection('players').get();
              const b=db.batch();
              snap.forEach(d=>b.delete(d.ref));
              await b.commit();
              _playerStatsCache={};
              toast('Cleared. Running backfill...','i');
              await backfill();
            }catch(e){toast(e.message,'e');setRecomputing(false);}
          }}>
            🗑️ Reset & Backfill
          </button>
        </div>
      </div>
      {loading?(
        <div style={{textAlign:'center',padding:24}}><span className="spin"/></div>
      ):(
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:10}}>
            <thead>
              <tr style={{background:'var(--bg3)',fontSize:9,color:'var(--t3)',textTransform:'uppercase'}}>
                <th style={{padding:'5px 8px',textAlign:'left'}}>Player</th>
                <th style={{padding:'5px 4px',textAlign:'center'}}>Games</th>
                <th style={{padding:'5px 4px',textAlign:'center'}}>Total</th>
                <th style={{padding:'5px 4px',textAlign:'center'}}>Avg</th>
                <th style={{padding:'5px 4px',textAlign:'center'}}>Last</th>
                <th style={{padding:'5px 4px',textAlign:'center'}}>Played?</th>
              </tr>
            </thead>
            <tbody>
              {players.map(p=>(
                <tr key={p.id} style={{borderBottom:'1px solid var(--border)'}}>
                  <td style={{padding:'5px 8px',fontWeight:600,fontSize:11}}>{p.id}</td>
                  <td style={{padding:'5px 4px',textAlign:'center',color:'var(--t3)'}}>{p.matchCount||0}</td>
                  <td style={{padding:'5px 4px',textAlign:'center',fontWeight:700,color:'var(--or)'}}>{p.totalPts||0}</td>
                  <td style={{padding:'5px 4px',textAlign:'center',color:p.avgPts>=40?'var(--green)':p.avgPts>=25?'var(--or)':'var(--t3)'}}>{p.avgPts||0}</td>
                  <td style={{padding:'5px 4px',textAlign:'center',color:'var(--blue)'}}>{p.lastMatchPts||'-'}</td>
                  <td style={{padding:'5px 4px',textAlign:'center'}}>{p.playedLastMatch?'✅':'❌'}</td>
                </tr>

          </table>
        </div>
      )}
    </div>
  );
}

function DiscoveredPlayersPanel(){
  const[squads,setSquads]=useState({});

  useEffect(()=>{
    const teams=Object.keys(IPL_SQUADS);
    const unsubs=teams.map(t=>
      db.collection('squads').doc(t).onSnapshot(d=>{
        if(d.exists) setSquads(prev=>({...prev,[t]:d.data().players||[]}));
      },()=>{})
    );
    return()=>unsubs.forEach(u=>u());
  },[]);

  const updateRole=async(team,name,newRole)=>{
    const players=(squads[team]||[]).map(p=>p.name===name?{...p,role:newRole}:p);
    await db.collection('squads').doc(team).set({players,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    toast('Role updated','s');
  };
  const removePlayer=async(team,name)=>{
    const players=(squads[team]||[]).filter(p=>p.name!==name);
    await db.collection('squads').doc(team).set({players,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    toast('Player removed','s');
  };

  const allDiscovered=Object.entries(squads).flatMap(([team,players])=>
    players.filter(p=>p.discovered).map(p=>({...p,team}))
  );

  if(allDiscovered.length===0) return(
    <div className="empty">
      <div style={{fontSize:32}}>✅</div>
      <div>No undiscovered players yet. Pulls at 7:10 & 7:20 PM will auto-populate this.</div>

function LockTimeOverride(){
  const[overrides,setOverrides]=useState({});

  useEffect(()=>{
    db.collection('_meta').doc('lockOverrides').get()
      .then(d=>{if(d.exists)setOverrides(d.data());}).catch(()=>{});
  },[]);

  const save=async(matchId,val)=>{
    const newOv={...overrides};
    if(!val.trim()) delete newOv[matchId]; else newOv[matchId]=val.trim();
    try{
      await db.collection('_meta').doc('lockOverrides').set(newOv);
      setOverrides(newOv);
      Object.assign(_lockOverrides,newOv);
      toast('Lock override saved','s');
    }catch(e){toast(e.message,'e');}
  };

  const upcoming=SCHEDULE.filter(m=>{
    const d=new Date(m.date+'T00:00:00+05:30');
    const future=new Date(d);future.setDate(future.getDate()+3);
    return new Date()<=future&&m.type==='ipl';
  }).slice(0,8);

  return(
    <div>
      {upcoming.map(m=>(
        <LockOverrideRow key={m.id} m={m} overrides={overrides} onSave={save}/>
      ))}
      <div style={{fontSize:9,color:'var(--t3)',marginTop:4}}>
        Format: 2026-03-29T19:35 (IST). Blank = restore default.
      </div>
    </div>
  );
}

// Extract name from cricapi field — can be string OR {id, name} object
function extractName(field){
  if(!field) return '';
  if(typeof field === 'string') return field.trim();
  if(typeof field === 'object') return String(field.name||field.Name||field.player||'').trim();
  return String(field).trim();
}

// Extract raw innings from cricapi scorecard for display
// ═══════════════════════════════════════════════════════════
// LIVE SCORE ENGINE
// Timeline per match:
//   30 min before lockTime → start polling every 10 min
//   lockTime + 4h45m → stop polling
// ═══════════════════════════════════════════════════════════
// Extract raw innings from cricapi scorecard for display
function extractRawInnings(scoreData){
  const sc=scoreData.scorecard||scoreData.score_card||[];
  return sc.map(function(inn){
    return {
      inning:String(inn.inning||inn.team||''),
      score:String(inn.score||''),
      batting:(inn.batting||[]).map(function(b){
        return {
          batsman:extractName(b.batsman||b.name),
          r:parseInt(b.r||0)||0, b:parseInt(b.b||0)||0,
          f4:parseInt(b['4s']||b.fours||0)||0,
          s6:parseInt(b['6s']||b.sixes||0)||0,
          dismissal:String(b.dismissal||b.how_out||'not out'),
        };
      }),
      bowling:(inn.bowling||[]).map(function(bw){
        return {
          bowler:extractName(bw.bowler||bw.name),
          o:String(bw.o||bw.overs||'0'),
          r:parseInt(bw.r||bw.runs||0)||0,
          w:parseInt(bw.w||bw.wickets||0)||0,
          m:parseInt(bw.m||bw.maidens||0)||0,
          wd:parseInt(bw.wd||bw.wides||0)||0,
          nb:parseInt(bw.nb||bw.noballs||0)||0,
          // dot balls not available in scorecard API — needs ball-by-ball feed
          dots:0,
        };
      }),
    };
  });
}


// ═══════════════════════════════════════════════════════════
// LIVE SCORE ENGINE
// Polls every 10 min from 30 min before lockTime to 30 min after match
// Works for both afternoon (10:00 UTC / 3:30 PM IST) and
// evening (14:00 UTC / 7:30 PM IST) games automatically
// One score entry per CVPL team (keyed by cvplId)
// ═══════════════════════════════════════════════════════════
function LiveScoreEngine({onPollReady}){
  const intervalRef=useRef(null);
  const pollRunning=useRef(false);

  // Track which matches are already marked final (avoid re-polling)
  const finalMatches=useRef(new Set());

  const shouldPoll=(match)=>{
    if(match.type==='wc') return false;
    if(finalMatches.current.has(match.id)) return false;
    const now=new Date();
    const lock=new Date(match.lockTime);
    const end=new Date(lock.getTime()+4.5*3600000);
    // Only poll AFTER the match starts (lockTime) until it ends (~4.5h later)
    // Don't poll before the match — that wastes API hits
    return now>=lock&&now<=end;
  };

  const isMatchFinal=(status)=>{
    if(!status) return false;
    const s=status.toLowerCase();
    return s.includes('won')||s.includes('win')||s.includes('tied')||
           s.includes('no result')||s.includes('abandoned')||s.includes('match ended');
  };


  // Pull Playing XI from match_info API — call at 7:10 PM and 7:20 PM before match
  const pullPlayingXI=useCallback(async(match)=>{
    console.log('[Engine] Pulling Playing XI for',match.id,'apiId:',match.apiMatchId);
    try{
      const data=await fetchMatchInfo(match.apiMatchId);
      console.log('[Engine] match_info keys:',Object.keys(data));
      // Store raw match_info response for debugging (first 2000 chars)
      // Store raw API data (without xi — that's added after parsing below)
      const _rawTeamInfo=JSON.stringify((data.teamInfo||[]).map(t=>({
        name:t.name||t.teamName||'',
        players:(t.players||[]).map(p=>({
          name:p.name||String(p),
          playerType:p.playerType||'unknown',
          id:p.id||''
        }))
      })));
      const _rawPlaying11=JSON.stringify(data.playing11||[]);
      const _rawSquad=JSON.stringify((data.squad||[]).slice(0,30));
      const _rawStatus=String(data.status||data.matchStatus||'');
      const _rawKeys=Object.keys(data);
      // Will store to Firestore after xi is built below
      const xi={};

      // Format 1: data.playing11 = [{name:'...', role:'...'}, ...]
      if(data.playing11&&data.playing11.length>0){
        console.log('[Engine] Format 1: playing11 array, len=',data.playing11.length);
        data.playing11.forEach(p=>{
          const name=extractName(p.name||p);
          if(name) xi[name]='playing';
        });
      }

      // Format 2: data.teams = ['MI','KKR'] + data.squad = [{name, isPlaying, team}]
      if(data.squad&&data.squad.length>0){
        console.log('[Engine] Format 2: squad array, len=',data.squad.length);
        data.squad.forEach(p=>{
          const name=extractName(p.name||p.player);
          const isPlaying=p.isPlaying===true||p.isPlaying==='true'||p.playing11===true;
          if(name) xi[name]=isPlaying?'playing':'bench';
        });
      }

      // Format 3: data.teamInfo = [{name:'MI', players:[{name,playerType}]}]
      if(data.teamInfo&&data.teamInfo.length>0){
        console.log('[Engine] Format 3: teamInfo, teams=',data.teamInfo.length);
        data.teamInfo.forEach(team=>{
          (team.players||[]).forEach(p=>{
            const name=extractName(p.name||p);
            const isPlaying=p.playerType==='playing11'||p.playing11===true||p.playing11==='true';
            if(name&&!xi[name]) xi[name]=isPlaying?'playing':'bench';
          });
        });
      }

      // Format 4: scorecard already has batting/bowling — try scorecard endpoint as fallback
      if(Object.keys(xi).length===0){
        console.log('[Engine] match_info gave no XI. Trying scorecard for player names...');
        try{
          const sc=await fetchScorecard(match.apiMatchId);
          if(sc&&sc.scorecard){
            sc.scorecard.forEach(inn=>{
              (inn.batting||[]).forEach(b=>{const n=extractName(b.batsman||b.name);if(n)xi[n]='playing';});
              (inn.bowling||[]).forEach(bw=>{const n=extractName(bw.bowler||bw.name);if(n)xi[n]='playing';});
            });
            console.log('[Engine] Got',Object.keys(xi).length,'players from scorecard');
          }
        }catch(e2){console.warn('[Engine] Scorecard fallback failed:',e2.message);}
      }

      // Always write raw response to Firestore — even when xi is empty
      // This is critical so admin can see WHAT the API returned when pull fails
      // Store raw response in live_scores (same collection as XI — known working)
      db.collection('live_scores').doc(match.id).set({
        xiRawPull:{
          at:new Date().toISOString(),
          keys:_rawKeys,
          status:_rawStatus,
          teamInfo:_rawTeamInfo,
          playing11:_rawPlaying11,
          parsedXI:JSON.stringify(xi),
          playerCount:Object.keys(xi).length,
          playingCount:Object.values(xi).filter(v=>v==='playing').length,
        }
      },{merge:true}).catch(e=>console.warn('[Engine] Raw store failed:',e.message));

      if(Object.keys(xi).length===0){
        console.log('[Engine] ⚠️ No XI data found. Full response keys:',_rawKeys,'Status:',_rawStatus);
        return false;
      }

      // ── Auto-discover unknown players and add to Firestore squads ──────────
      // For each team in the match, find players not in IPL_SQUADS and persist them
      const teamsInMatch=[match.home,match.away];
      for(const team of teamsInMatch){
        const known=(IPL_SQUADS[team]||[]).map(p=>p.name);
        const newPlayers=[];
        Object.keys(xi).forEach(name=>{
          // fuzzy check — if name doesn't resolve to any known player, it's new
          const resolved=normalizeName(name,known);
          if(!resolved){
            console.log('[Engine] New player discovered:',name,'for',team);
            newPlayers.push({name,role:'AR',team,discovered:true}); // default AR, admin can fix
          }
        });
        if(newPlayers.length>0){
          // Save to Firestore squads/{team} so all clients pick them up
          const squadDoc=await db.collection('squads').doc(team).get();
          const existing=squadDoc.exists?squadDoc.data().players||[]:[];
          const existingNames=existing.map(p=>p.name);
          const toAdd=newPlayers.filter(p=>!existingNames.includes(p.name));
          if(toAdd.length>0){
            await db.collection('squads').doc(team).set(
              {players:[...existing,...toAdd],updatedAt:firebase.firestore.FieldValue.serverTimestamp()},
              {merge:true}
            );
            console.log('[Engine] Added',toAdd.length,'new players to squads/'+team+':',toAdd.map(p=>p.name));
          }
        }
      }

      // Save XI data to live_scores
      await db.collection('live_scores').doc(match.id).set(
        {startingXI:xi,squadPullTime:new Date().toISOString(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},
        {merge:true}
      );
      console.log('[Engine] XI saved for',match.id,Object.keys(xi).length,'players');
      // Update parsedXI in live_scores now that xi is fully built
      db.collection('live_scores').doc(match.id).set({
        xiRawPull:{
          at:new Date().toISOString(),
          keys:_rawKeys,
          status:_rawStatus,
          teamInfo:_rawTeamInfo,
          playing11:_rawPlaying11,
          parsedXI:JSON.stringify(xi),
          playerCount:Object.keys(xi).length,
          playingCount:Object.values(xi).filter(v=>v==='playing').length,
        }
      },{merge:true}).catch(()=>{});
      // Store pull log — latest + full history
      const pullEntry={
        at: new Date().toISOString(),
        playersFound: Object.keys(xi).length,
        playing: Object.entries(xi).filter(([,v])=>v==='playing').map(([k])=>k),
        impact: Object.entries(xi).filter(([,v])=>v==='impact').map(([k])=>k),
        bench: Object.entries(xi).filter(([,v])=>v==='bench').map(([k])=>k),
      };
      // Keep up to last 8 pull attempts
      const prev = (await db.collection('live_scores').doc(match.id).get().catch(()=>({data:()=>({})}))).data()||{};
      const history = [...(prev.xiPullHistory||[]).slice(-7), pullEntry];
      await db.collection('live_scores').doc(match.id).set({
        xiPullLog: pullEntry,        // latest
        xiPullHistory: history,      // all attempts
      },{merge:true}).catch(()=>{});
      return true;
    }catch(e){
      console.warn('[Engine] XI pull failed:',e.message);
      throw e;
    }
  },[]);

  const pollScores=useCallback(async()=>{
    if(pollRunning.current) return;
    // Distributed lock: check if another tab polled in last 8 min
    try{
      const lockDoc=await db.collection('_meta').doc('poll_lock').get();
      if(lockDoc.exists){
        const lastPoll=lockDoc.data().lastPoll||'';
        const msSince=Date.now()-new Date(lastPoll).getTime();
        if(msSince<8*60*1000){
          console.log('[Engine] Skipping — another tab polled',Math.round(msSince/1000)+'s ago');
          return;
        }
      }
      // Claim the lock
      await db.collection('_meta').doc('poll_lock').set({lastPoll:new Date().toISOString(),tabId:Math.random().toString(36).slice(2)},{merge:true});
    }catch(e){console.warn('[Engine] Lock check failed',e.message);}
    pollRunning.current=true;
    const active=SCHEDULE.filter(shouldPoll);
    if(active.length>0) console.log('[Engine] Poll at',new Date().toISOString(),'matches:',active.map(m=>m.id).join(','));
    for(const match of active){
      try{
        let apiMatchId=match.apiMatchId||null;
        try{
          const s=await db.collection('live_scores').doc(match.id).get();
          if(s.exists&&s.data().manuallySet) apiMatchId=s.data().apiMatchId||apiMatchId;
        }catch(e){}
        if(!apiMatchId){console.log('[Engine] No apiMatchId for',match.id);continue;}

        // ── CREDIT-OPTIMISED POLLING ─────────────────────────────────────
        // match_info   = 1 credit  → live score (runs/wickets/overs only)
        // match_scorecard = 10 credits → full batting/bowling + pts compute
        //
        // Flow:
        //   Every 30 min → match_info (1 credit) → update scoreboard display
        //   Match ends   → match_scorecard (10 credits, ONCE) → compute all pts
        //   isFinal=true → stop polling forever

        // Step 1: cheap score pull (1 credit)
        console.log('[Engine] Score poll (1 credit) for',match.id);
        const infoData=await fetchCurrentScore(apiMatchId);
        if(!infoData){console.log('[Engine] No data for',match.id);continue;}

        const matchNowFinal=isMatchFinal(infoData.status||'');
        const lsRef=db.collection('live_scores').doc(match.id);
        const lsSnap0=await lsRef.get();
        const prev0=lsSnap0.exists?lsSnap0.data():{};
        const pollCount=(prev0.scorePollCount||0)+1;

        // Update score display immediately
        await lsRef.set({
          status:String(infoData.status||''),
          scores:(infoData.score||[]).map(s=>({
            inning:String(s.inning||''),r:String(s.r||'0'),
            w:String(s.w||'0'),o:String(s.o||'0')
          })),
          scorePollCount:pollCount,
          lastPollTime:new Date().toISOString(),
          updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
        },{merge:true});
        console.log('[Engine] Score updated:',infoData.status,'polls='+pollCount);

        // DOTBALL BBB: disabled until dot ball source confirmed — re-enable later
        // To re-enable: remove the 'false&&' guard below
        if(false && pollCount>0 && pollCount%6===0){
          // BBB disabled — placeholder for when we re-enable
        }
        // Legacy BBB block (kept for reference, never executes due to 'false' guard above)
        if(false && pollCount>0 && pollCount%6===0){
          console.log('[Engine] Poll #'+pollCount+' → BBB dot ball fetch (10 credits) for',match.id);
          try{
            const bbbData=await fetchBallByBall(apiMatchId);
            const dotMap=parseDotBalls(bbbData);
            if(Object.keys(dotMap).length>0){
              // Merge dot balls into stored ptsMap — recompute pts with dots
              const curSnap=await lsRef.get();
              const curData=curSnap.exists?curSnap.data():{};
              const curPtsMap=curData.ptsMap||{};
              let dotsUpdated=0;
              const updatedPtsMap={};
              for(const [name, pdata] of Object.entries(curPtsMap)){
                const resolvedBowler=normalizeName(name,Object.keys(dotMap));
                const playerDots=resolvedBowler?dotMap[resolvedBowler]:0;
                if(playerDots>0 && pdata.bowl){
                  // Recompute bowling pts with dots
                  const newBowl={...pdata.bowl,d:playerDots};
                  const bowlRes=score(null,newBowl,pdata.role||'BOWL');
                  const batPts=pdata.bat?score(pdata.bat,null,pdata.role||'BAT').total:0;
                  const newTotal=Math.round((batPts+bowlRes.total)*10)/10;
                  updatedPtsMap[name]={...pdata,bowl:newBowl,pts:newTotal};
                  dotsUpdated++;
                } else {
                  updatedPtsMap[name]=pdata;
                }
              }
              if(dotsUpdated>0){
                await lsRef.set({
                  ptsMap:updatedPtsMap,
                  dotMap,
                  lastBbbPoll:new Date().toISOString(),
                  updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
                },{merge:true});
                console.log('[Engine] ✅ Dot balls merged for',dotsUpdated,'bowlers');
                // Recompute team pts with updated ptsMap
                const teamsSnap2=await db.collection('teams').where('matchId','==',match.id).get();
                if(!teamsSnap2.empty){
                  const batch2=db.batch();
                  teamsSnap2.forEach(tdoc=>{
                    const team=tdoc.data();
                    const teamKey=team.cvplId||team.userId;
                    if(!teamKey) return;
                    let total2=0;
                    const detail2=(team.players||[]).map(p=>{
                      const res=normalizeName(p.name,Object.keys(updatedPtsMap));
                      const cp=res?updatedPtsMap[res]:null;
                      const base=cp?cp.pts:0;
                      const mult=p.isC?2:p.isVC?1.5:1;
                      const final=Math.round(base*mult*10)/10;
                      total2+=final;
                      return{name:String(p.name),role:String(p.role||'BAT'),base,mult,final};
                    });
                    total2=Math.round(total2*10)/10;
                    batch2.set(db.collection('match_pts').doc(match.id+'_'+teamKey),{
                      pts:total2,detail:detail2,
                      calculatedAt:firebase.firestore.FieldValue.serverTimestamp(),
                    },{merge:true});
                  });
                  await batch2.commit();
                  console.log('[Engine] Team pts updated with dot balls');
                }
              }
            }
          }catch(e){console.warn('[Engine] BBB fetch failed:',e.message);}
        }

        // Step 2: if match just ended and scorecard not yet pulled → pull it (10 credits, ONCE)
        if(matchNowFinal&&!prev0.isFinal){
          console.log('[Engine] ★ Match FINAL — pulling full scorecard (10 credits) for pts...');
          let scoreData;
          try{
            scoreData=await fetchScorecard(apiMatchId);
          }catch(e){
            console.warn('[Engine] Scorecard pull failed:',e.message);
            await lsRef.set({isFinal:true,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
            finalMatches.current.add(match.id);
            pollRunning.current=false;
            return;
          }

          const ptsMap=parseScorecard(scoreData);
        const safePtsMap={};
        Object.entries(ptsMap).forEach(([k,v])=>{
          safePtsMap[k]={pts:v.pts||0,role:v.role||'BAT',team:v.team||'',
            bat:v.bat?{runs:v.bat.runs||0,b:v.bat.b||0,f:v.bat.f||0,s:v.bat.s||0}:null,
            bowl:v.bowl?{o:v.bowl.o||0,rc:v.bowl.rc||0,w:v.bowl.w||0,m:v.bowl.m||0}:null,bd:v.bd||{}};
        });

        // Merge scorecard data into existing doc (match_info already updated scores/status)
        await lsRef.set({
          apiMatchId:String(apiMatchId),
          rawInnings:extractRawInnings(scoreData),
          ptsMap:safePtsMap,
          isFinal:true,
          lastScorecardPoll:new Date().toISOString(),
          updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
        },{merge:true});
        finalMatches.current.add(match.id);
        console.log('[Engine] ★ Final scorecard saved for',match.id);
        // Update persistent player stats table
        updatePlayerStatsFromPtsMap(match.id, match.date, safePtsMap).catch(()=>{});

        const teamsSnap=await db.collection('teams').where('matchId','==',match.id).get();
        if(teamsSnap.empty){pollRunning.current=false;continue;}
        const storedXI=prev0.startingXI||{};
        const batch=db.batch();
        teamsSnap.forEach(tdoc=>{
          const team=tdoc.data();
          if(!team.cvplId&&!team.userId) return;

          // ── Backup substitution with role constraints ────────
          // DNP = marked 'bench' in startingXI, OR no scorecard entry when match has data
          const ptsMapNames=Object.keys(safePtsMap);
          const anyTeamPlayed=(teamName)=>ptsMapNames.some(n=>{
            const pid=resolvePlayerPid(n);
            return pid&&PLAYER_REGISTRY[pid]?.team===teamName;
          });
          const isDNP=(p)=>{
            if(storedXI[p.name]==='bench') return true;
            const res=normalizeName(p.name,ptsMapNames);
            if(!res&&anyTeamPlayed(p.team)) return true;
            return false;
          };
          // Count roles in a player list
          const roleCounts=(players)=>players.reduce((a,p)=>({...a,[p.role]:(a[p.role]||0)+1}),{});
          // Check if removing a player violates minimums (1 WK, 1 BAT, 1 BOWL, 1 AR)
          const meetsMinimums=(players)=>{
            const rc=roleCounts(players);
            return (rc.WK||0)>=1&&(rc.BAT||0)>=1&&(rc.BOWL||0)>=1&&(rc.AR||0)>=1;
          };

          let activePlayers=[...(team.players||[])];
          const backups=[...(team.backups||[])];
          const usedBackups=new Set();

          // Replace DNP starters with backups — try each backup in order
          activePlayers=activePlayers.map(p=>{
            if(!isDNP(p)) return p;
            // Try backups in order: prefer same role, then check constraints
            const candidates=[
              ...backups.filter(b=>!usedBackups.has(b.name)&&b.role===p.role),
              ...backups.filter(b=>!usedBackups.has(b.name)&&b.role!==p.role),
            ];
            for(const sub of candidates){
              // Test if substituting this player keeps constraints
              const testTeam=activePlayers.map(x=>x.name===p.name?{...sub,isC:p.isC,isVC:p.isVC}:x);
              if(meetsMinimums(testTeam)){
                usedBackups.add(sub.name);
                console.log('[Engine] Backup sub:',p.name,'('+p.role+') →',sub.name,'('+sub.role+')',isDNP(p)?'DNP':'bench');
                return{...sub,isC:p.isC,isVC:p.isVC,subFor:p.name};
              }
            }
            console.log('[Engine] No valid backup for',p.name,'— no sub maintains constraints');
            return p;
          });

          let total=0;
          const detail=activePlayers.map(p=>{
            const resolvedName=normalizeName(p.name,ptsMapNames);
            const cp=resolvedName?safePtsMap[resolvedName]:null;
            const base=cp?cp.pts:0;
            const mult=p.isC?2:p.isVC?1.5:1;const final=Math.round(base*mult*10)/10;
            total+=final;
            return{name:String(p.name||''),role:String(p.role||'BAT'),base,mult,final,
              ...(p.subFor?{subFor:p.subFor}:{})};
          });
          total=Math.round(total*10)/10;
          const docKey=match.id+'_'+(team.cvplId||team.userId);
          batch.set(db.collection('match_pts').doc(docKey),{
            matchId:String(match.id),userId:String(team.userId||''),
            cvplId:String(team.cvplId||''),cvplName:String(team.cvplName||''),cvplEmoji:String(team.cvplEmoji||'🏏'),
            pts:total,detail,calculatedAt:firebase.firestore.FieldValue.serverTimestamp(),
          });
        });
        await batch.commit();
        console.log('[Engine] ★ Pts computed for',match.id,'players:'+Object.keys(safePtsMap).length);
        } // end if(matchNowFinal)
      }catch(e){console.warn('[Engine] Error',match.id,e.message);}
    }
    pollRunning.current=false;
  },[]);

  // Test BBB for a match — fetch and store raw response for admin inspection
  const testBBB=useCallback(async(match)=>{
    const apiMatchId=match.apiMatchId;
    if(!apiMatchId) throw new Error('No apiMatchId');
    console.log('[BBB Test] Fetching match_bbb for',match.id,'(10 credits)');
    const bbbData=await fetchBallByBall(apiMatchId);
    console.log('[BBB Test] Raw response keys:', Object.keys(bbbData||{}));
    console.log('[BBB Test] Full:', JSON.stringify(bbbData).slice(0,500));
    // Store raw BBB response for admin review
    await db.collection('_meta').doc('lastBBB_'+match.id).set({
      matchId:match.id,
      pulledAt:new Date().toISOString(),
      rawKeys:Object.keys(bbbData||{}),
      // Try all known innings paths
      hasInnings:!!(bbbData?.innings||bbbData?.scorecard||bbbData?.bbb),
      inningsCount:(bbbData?.innings||bbbData?.scorecard||[]).length,
      rawSample:JSON.stringify(bbbData).slice(0,2000),
    },{merge:false});
    const dots=parseDotBalls(bbbData);
    console.log('[BBB Test] Parsed dots:', dots);
    return{rawKeys:Object.keys(bbbData||{}),dots,sample:JSON.stringify(bbbData).slice(0,300)};
  },[]);

  // Poll a specific match regardless of time window (for admin manual compute)
  const pollSingleMatch=useCallback(async(match)=>{
    if(match.type==='wc') throw new Error('WC matches use hardcoded data');
    const apiMatchId=match.apiMatchId||null;
    if(!apiMatchId) throw new Error('No apiMatchId for '+match.id);

    console.log('[Engine] Manual compute for',match.id,apiMatchId);

    // Step 1: Fetch scorecard (10 credits)
    const scoreData=await fetchScorecard(apiMatchId);
    if(!scoreData) throw new Error('No scorecard returned');
    console.log('[Engine] Scorecard status:',scoreData.status,'Innings:',scoreData.scorecard?.length||0);

    // DOTBALL BBB: disabled — re-enable once dot ball source confirmed
    // Step 2 skipped:
    let dotMap={};
    // BBB fetch disabled — dotMap stays empty

    // Step 3: Compute pts from scorecard
    const ptsMap=parseScorecard(scoreData);

    // Step 4: Merge dot balls into pts
    const ptsMapKeys=Object.keys(ptsMap);
    for(const [bowlerName,dots] of Object.entries(dotMap)){
      const resolved=normalizeName(bowlerName,ptsMapKeys);
      if(resolved&&ptsMap[resolved]&&ptsMap[resolved].bowl){
        ptsMap[resolved].bowl.d=dots;
        // Recompute pts for this bowler with dots
        const p=ptsMap[resolved];
        const bowlRes=score(null,p.bowl,p.role||'BOWL');
        const batPts=p.bat?score(p.bat,null,p.role||'BAT').total:0;
        p.pts=Math.round((batPts+bowlRes.total)*10)/10;
        p.bd={...p.bd,...bowlRes.bd};
      }
    }

    const safePtsMap={};
    Object.entries(ptsMap).forEach(([k,v])=>{
      safePtsMap[k]={pts:v.pts||0,role:v.role||'BAT',team:v.team||'',
        bat:v.bat?{runs:v.bat.runs||0,b:v.bat.b||0,f:v.bat.f||0,s:v.bat.s||0}:null,
        bowl:v.bowl?{o:v.bowl.o||0,rc:v.bowl.rc||0,w:v.bowl.w||0,m:v.bowl.m||0,d:v.bowl.d||0}:null,
        bd:v.bd||{}};
    });
    console.log('[Engine] Players scored:',Object.keys(safePtsMap).length,
      'with dots for:',Object.keys(dotMap).length,'bowlers');

    // Step 5: Save to Firestore
    const lsRef=db.collection('live_scores').doc(match.id);
    const lsSnap=await lsRef.get();
    const prev=lsSnap.exists?lsSnap.data():{};
    const pollCount=(prev.scorePollCount||0)+1;
    await lsRef.set({
      apiMatchId:String(apiMatchId),
      status:String(scoreData.status||''),
      scores:(scoreData.score||[]).map(s=>({inning:String(s.inning||''),r:String(s.r||'0'),w:String(s.w||'0'),o:String(s.o||'0')})),
      rawInnings:extractRawInnings(scoreData),
      ptsMap:safePtsMap,
      dotMap,
      lastBbbPoll:Object.keys(dotMap).length>0?new Date().toISOString():prev.lastBbbPoll||null,
      squadPullTime:prev.squadPullTime||null,startingXI:prev.startingXI||{},
      scorePollCount:pollCount,lastPollTime:new Date().toISOString(),
      isFinal:isMatchFinal(scoreData.status||''),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
    });

    // Step 6: Recompute team pts with updated ptsMap (including dots)
    const teamsSnap=await db.collection('teams').where('matchId','==',match.id).get();
    console.log('[Engine] Teams for',match.id,':',teamsSnap.size);
    if(!teamsSnap.empty){
      const batch=db.batch();
      teamsSnap.forEach(tdoc=>{
        const team=tdoc.data();
        if(!team.cvplId&&!team.userId) return;
        let total=0;
        const detail=(team.players||[]).map(p=>{
          const resolvedName=normalizeName(p.name,Object.keys(safePtsMap));
          const cp=resolvedName?safePtsMap[resolvedName]:null;
          const base=cp?cp.pts:0;
          const mult=p.isC?2:p.isVC?1.5:1;
          const final=Math.round(base*mult*10)/10;
          total+=final;
          return{name:String(p.name||''),role:String(p.role||'BAT'),base,mult,final};
        });
        total=Math.round(total*10)/10;
        const docKey=match.id+'_'+(team.cvplId||team.userId);
        batch.set(db.collection('match_pts').doc(docKey),{
          matchId:String(match.id),userId:String(team.userId||''),
          cvplId:String(team.cvplId||''),cvplName:String(team.cvplName||''),cvplEmoji:String(team.cvplEmoji||'🏏'),
          pts:total,detail,calculatedAt:firebase.firestore.FieldValue.serverTimestamp(),
        });
      });
      await batch.commit();
    }
    console.log('[Engine] ✅ Manual compute done — players:',Object.keys(safePtsMap).length,
      'teams:',teamsSnap.size,'dots:',Object.keys(dotMap).length,'bowlers');
    // Step 7: Update player stats table
    updatePlayerStatsFromPtsMap(match.id, match.date||new Date().toISOString().slice(0,10), safePtsMap).catch(()=>{});
    return {players:Object.keys(safePtsMap).length, teams:teamsSnap.size,
      status:scoreData.status, dotBowlers:Object.keys(dotMap).length};
  },[]);

  useEffect(()=>{
    console.log('[Engine] Starting — 10 min score polls, XI pulls at 7:10 PM and 7:20 PM (20min and 10min before lock)');
    // Load already-final matches from Firestore
    db.collection('live_scores').where('isFinal','==',true).get().then(snap=>{
      snap.forEach(d=>finalMatches.current.add(d.id));
      console.log('[Engine] Pre-loaded',finalMatches.current.size,'final matches');
    }).catch(()=>{});

    if(onPollReady) onPollReady(pollScores, pollSingleMatch, pullPlayingXI, testBBB);

    // Check every 5 min for XI pull window or score poll window
    const tick=async()=>{
      const now=new Date();
      for(const match of SCHEDULE.filter(m=>m.type==='ipl')){
        if(finalMatches.current.has(match.id)) continue;
        const lock=new Date(match.lockTime);
        const minToLock=(lock-now)/60000;
        // XI pull window: from 25 min before lock until lock time
        // Pull at 7:10 PM (20 min before) and 7:20 PM (10 min before)
        // Use live_scores doc to track — survives page reloads
        if(minToLock>=-5&&minToLock<=25){
          // XI pull windows: 7:10, 7:12, 7:15, 7:20 PM (20,18,15,10 min before 7:30 lock)
          const xiWindows=[
            {key:'xi1_'+match.id, minMin:19, minMax:21},  // 7:10 PM
            {key:'xi2_'+match.id, minMin:17, minMax:19},  // 7:12 PM
            {key:'xi3_'+match.id, minMin:14, minMax:16},  // 7:15 PM
            {key:'xi4_'+match.id, minMin:9,  minMax:11},  // 7:20 PM
          ];
          // Backup sub window: 7:38–7:45 PM (8–15 min AFTER lock = match started)
          const subKey='sub_'+match.id;
          const minsSinceLock=-minToLock; // positive when past lock
          if(minsSinceLock>=8&&minsSinceLock<=15&&!sessionStorage.getItem(subKey)){
            sessionStorage.setItem(subKey,'1');
            console.log('[Engine] 🔄 7:40 backup sub window — applying subs for',match.id);
            const lsDoc=await db.collection('live_scores').doc(match.id).get().catch(()=>null);
            const xiData=lsDoc?.exists?lsDoc.data().startingXI||{}:{};
            const teamsForSub=await db.collection('teams').where('matchId','==',match.id).get().catch(()=>null);
            if(teamsForSub&&!teamsForSub.empty){
              const batch2=db.batch();
              teamsForSub.forEach(tdoc=>{
                const tdata=tdoc.data();
                if(!tdata.cvplId&&!tdata.userId) return;
                const bks=[...(tdata.backups||[])];
                const usedSubs=new Set();
                const roleCts=(players)=>players.reduce((a,p)=>({...a,[p.role]:(a[p.role]||0)+1}),{});
                const meetsMin=(players)=>{const rc=roleCts(players);return(rc.WK||0)>=1&&(rc.BAT||0)>=1&&(rc.BOWL||0)>=1&&(rc.AR||0)>=1;};
                let newPlayers=[...(tdata.players||[])];
                let subsMade=[];
                newPlayers=newPlayers.map(p=>{
                  // A player is DNP if:
                  // a) Explicitly marked 'bench' in startingXI, OR
                  // b) XI has been pulled (≥11 playing) AND player is not in playing/impact list
                  const xiPulled=Object.keys(xiData).length>=11;
                  const playerXiStatus=xiData[p.name]; // 'playing','impact','bench', or undefined
                  const isDnp=playerXiStatus==='bench'||
                    (xiPulled&&playerXiStatus===undefined&&!xiData[p.name]);
                  if(!isDnp) return p;
                  const candidates=[
                    ...bks.filter(b=>!usedSubs.has(b.name)&&b.role===p.role),
                    ...bks.filter(b=>!usedSubs.has(b.name)&&b.role!==p.role),
                  ];
                  for(const sub of candidates){
                    const test=newPlayers.map(x=>x.name===p.name?{...sub}:x);
                    if(meetsMin(test)){
                      usedSubs.add(sub.name);
                      subsMade.push(p.name+'→'+sub.name);
                      return{...sub,isC:p.isC,isVC:p.isVC,subFor:p.name};
                    }
                  }
                  return p;
                });
                if(subsMade.length>0){
                  console.log('[Engine] Subs applied for',tdata.cvplId||tdata.userId,':',subsMade.join(', '));
                  batch2.set(db.collection('teams').doc(tdoc.id),
                    {players:newPlayers,backupSubsApplied:subsMade,backupSubTime:new Date().toISOString()},
                    {merge:true});
                }
              });
              await batch2.commit().catch(()=>{sessionStorage.removeItem(subKey);});
            }
          }
          for(const w of xiWindows){
            if(minToLock>=w.minMin && minToLock<=w.minMax && !sessionStorage.getItem(w.key)){
              sessionStorage.setItem(w.key,'1');
              console.log('[Engine] 👥 Auto XI pull #'+w.key.slice(2,3)+' minToLock='+Math.round(minToLock)+' for',match.id);
              pullPlayingXI(match).catch(e=>{
                sessionStorage.removeItem(w.key);
                console.warn('[Engine] XI pull failed:',e.message);
              });
              break; // only one pull per poll cycle
            }
          }
        }
      }
      pollScores();
    };

    tick();
    intervalRef.current=setInterval(tick,10*60*1000); // 10 min — match_info = 1 credit
    return()=>clearInterval(intervalRef.current);
  },[pollScores,pollSingleMatch,pullPlayingXI]);

  return null;
}

// ═══════════════════════════════════════════════════════════
// ROOT RENDER
// ═══════════════════════════════════════════════════════════
function Root(){
  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[loading,setLoading]=useState(true);
  const[page,setPage]=useState('home');
  const[activeMatch,setActiveMatch]=useState(null);
  // Load API key pool + lock overrides + player stats on startup
  useEffect(()=>{
    loadKeyPool()
      .then(()=>loadLockOverrides())
      .then(()=>loadMatchTitles())
      .then(()=>loadPlayerStats());
  },[]);
  const forcePollRef=useRef(null);
  const pollMatchRef=useRef(null);
  const pullXIRef=useRef(null);
  const testBBBRef=useRef(null);

  useEffect(()=>{
    if(window.location.protocol==='file:'){setLoading(false);return;}
    const unsub=auth.onAuthStateChanged(async u=>{
      if(u){
        setUser(u);
        try{
          const snap=await db.collection('users').doc(u.uid).get();
          if(snap.exists){
            const d=snap.data();
            setProfile({
              id:u.uid,
              displayName:d.displayName||d.name||u.email||'',
              email:d.email||u.email||'',
              cvplId:d.cvplId||d.teamId||'',
              cvplName:d.cvplName||d.teamName||'',
              cvplEmoji:d.cvplEmoji||d.teamEmoji||'🏏',
              isAdmin:d.isAdmin||false,
            });
          }else{
            // Doc missing — create minimal profile so they get past login
            setProfile({id:u.uid,displayName:u.email||'',email:u.email||'',
              cvplId:'',cvplName:'',cvplEmoji:'🏏',isAdmin:false});
          }
        }catch(e){
          console.error('Profile load error:',e.message);
          // Permissions error or network — still let them in with minimal profile
          setProfile({id:u.uid,displayName:u.email||'',email:u.email||'',
            cvplId:'',cvplName:'',cvplEmoji:'🏏',isAdmin:false});
        }
      }else{setUser(null);setProfile(null);}
      setLoading(false);
    });
    return unsub;
  },[]);

  if(window.location.protocol==='file:') return<FileGuide/>;
  if(loading) return<Splash/>;
  if(!user||!profile) return<AuthScreen onDone={(u,p)=>{setUser(u);setProfile(p);}}/>;

  const nav=(p,match=null)=>{setPage(p);if(match!==null)setActiveMatch(match);};
  const handleForcePoll=()=>{
    if(forcePollRef.current){
      forcePollRef.current();
      toast('Force poll triggered','i');
    }else{toast('Engine not ready','e');}
  };
  const handlePollMatch=async(match)=>{
    if(pollMatchRef.current) return pollMatchRef.current(match);
    throw new Error('Engine not ready');
  };
  const handlePullXI=async(match)=>{
    if(pullXIRef.current) return pullXIRef.current(match);
    throw new Error('Engine not ready');
  };
  const handleTestBBB=async(match)=>{
    if(testBBBRef.current) return testBBBRef.current(match);
    throw new Error('Engine not ready');
  };

  return(
    <div className="app">
      <LiveScoreEngineWrapper forcePollRef={forcePollRef} pollMatchRef={pollMatchRef} pullXIRef={pullXIRef} testBBBRef={testBBBRef}/>
      <div className="content">
        {page==='home'&&<Home profile={profile} onNav={nav}/>}
        {page==='match'&&<MatchPage match={activeMatch} profile={profile} onNav={nav}/>}
        {page==='build'&&<BuildFlow match={activeMatch} profile={profile} onNav={nav}/>}
        {page==='season'&&<SeasonBoard profile={profile}/>}
        {page==='settings'&&<SettingsPage profile={profile} onProfileUpdate={setProfile} onForcePoll={handleForcePoll} onPollMatch={handlePollMatch} onPullXI={handlePullXI} onTestBBB={handleTestBBB}/>}
      </div>
      {page!=='build'&&(
        <nav className="bnav">
          <button className={`bi ${page==='home'?'act':''}`} onClick={()=>nav('home')}>
            <span className="bi-ico">🏏</span>Home
          </button>
          <button className={`bi ${page==='season'?'act':''}`} onClick={()=>nav('season')}>
            <span className="bi-ico">🏆</span>Season
          </button>
          <button className={`bi ${page==='settings'?'act':''}`} onClick={()=>nav('settings')}>
            <span className="bi-ico">⚙️</span>Settings
          </button>
        </nav>
      )}
    </div>
  );
}

// Wrapper so LiveScoreEngine can expose its pollScores via ref
function LiveScoreEngineWrapper({forcePollRef,pollMatchRef,pullXIRef,testBBBRef}){
  const pollRef=useRef(null);
  const pollSingleRef=useRef(null);
  const pullXISingleRef=useRef(null);
  const testBBBSingleRef=useRef(null);

  useEffect(()=>{
    forcePollRef.current=()=>{if(pollRef.current) pollRef.current();};
    pollMatchRef.current=(match)=>{
      if(pollSingleRef.current) return pollSingleRef.current(match);
      return Promise.reject(new Error('Engine not ready'));
    };
    if(pullXIRef) pullXIRef.current=(match)=>{
      if(pullXISingleRef.current) return pullXISingleRef.current(match);
      return Promise.reject(new Error('Engine not ready'));
    };
    if(testBBBRef) testBBBRef.current=(match)=>{
      if(testBBBSingleRef.current) return testBBBSingleRef.current(match);
      return Promise.reject(new Error('Engine not ready'));
    };
  },[]);

  return <LiveScoreEngine onPollReady={(poll,pollSingle,pullXI,testBBBFn)=>{
    pollRef.current=poll;
    pollSingleRef.current=pollSingle;
    pullXISingleRef.current=pullXI;
    testBBBSingleRef.current=testBBBFn;
  }}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
