  if(!liveScore||rawInnings.length===0){
    return(
      <div>
        {liveScore?.status&&<div style={{fontSize:11,color:'var(--t2)',background:'var(--bg3)',borderRadius:8,padding:'10px 12px',marginBottom:10}}>{liveScore.status}</div>}
        <div className="empty">
          <div style={{fontSize:36}}>🏏</div>
          <div style={{fontWeight:600,marginBottom:4}}>Scorecard loading...</div>
          <div style={{fontSize:11,color:'var(--t3)'}}>Pulls automatically once match starts</div>
        </div>
      </div>
    );
  }

  const inn=rawInnings[inningIdx]||rawInnings[0];
  const batters=inn.batting||[];
  const bowlers=inn.bowling||[];

  return(
    <div>
      {liveScore?.status&&(
        <div style={{fontSize:11,color:'var(--t2)',background:'var(--bg3)',borderRadius:8,padding:'10px 12px',marginBottom:10}}>
          {liveScore.status}
        </div>
      )}
      <div className="tabs" style={{marginBottom:10}}>
        {rawInnings.map((inn,i)=>{
          const teamShort=(inn.inning||'Inn '+(i+1)).split(' Inning')[0].split(' ').pop();
          return(
            <button key={i} className={`tab ${inningIdx===i?'act':''}`} onClick={()=>setInningIdx(i)}>
              {teamShort}
            </button>
          );
        })}
      </div>

      <div style={{fontWeight:700,fontSize:11,color:'var(--t3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:6}}>
        🏏 Batting — {(inn.inning||'').replace(' Inning 1','').replace(' Inning 2','')}
      </div>
      <div style={{borderRadius:10,overflow:'hidden',border:'1px solid var(--border)',marginBottom:14}}>
        <table className="sc-tbl">
          <thead>
            <tr>
              <th>Batter</th>
              <th style={{textAlign:'right'}}>R</th>
              <th style={{textAlign:'right'}}>B</th>
              <th style={{textAlign:'right'}}>4s</th>
              <th style={{textAlign:'right'}}>6s</th>
              <th style={{textAlign:'right'}}>SR</th>
            </tr>
          </thead>
          <tbody>
            {batters.map((b,i)=>{
              const runs=parseInt(b.r||0)||0;
              const balls=parseInt(b.b||0)||0;
              const sr=balls>0?Math.round((runs/balls)*1000)/10:0;
              return(
                <tr key={i} className={runs>=50?'hi':''}>
                  <td style={{maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    <div style={{fontWeight:600,fontSize:11}}>{b.batsman||'—'}</div>
                    <div style={{fontSize:9,color:'var(--t3)'}}>{b.dismissal||'not out'}</div>
                  </td>
                  <td className="n" style={{fontWeight:700,color:runs>=50?'var(--gold)':runs>=30?'var(--t2)':'var(--t1)'}}>{runs}</td>
                  <td className="n" style={{color:'var(--t3)'}}>{balls}</td>
                  <td className="n">{parseInt(b.f4||0)||0}</td>
                  <td className="n">{parseInt(b.s6||0)||0}</td>
                  <td className="n" style={{fontSize:10,color:sr>170?'var(--green)':sr<50&&balls>=10?'var(--red)':'var(--t3)'}}>{(sr||0).toFixed(1)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {bowlers.length>0&&(
        <div>
          <div style={{fontWeight:700,fontSize:11,color:'var(--t3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:6}}>
            🎯 Bowling
          </div>
          <div style={{borderRadius:10,overflow:'hidden',border:'1px solid var(--border)'}}>
            <table className="sc-tbl">
              <thead>
                <tr>
                  <th>Bowler</th>
                  <th style={{textAlign:'right'}}>O</th>
                  <th style={{textAlign:'right'}}>R</th>
                  <th style={{textAlign:'right'}}>W</th>
                  <th style={{textAlign:'right'}}>M</th>
                  <th style={{textAlign:'right'}}>Wd</th>
                  <th style={{textAlign:'right'}}>Dots</th>
                  <th style={{textAlign:'right'}}>Eco</th>
                </tr>
              </thead>
              <tbody>
                {bowlers.map((bw,i)=>{
                  const oStr=String(bw.o||'0');
                  const oNum=parseFloat(oStr)||0;
                  const r=parseInt(bw.r||0)||0;
                  const eco=oNum>0?Math.round((r/oNum)*10)/10:0;
                  return(
                    <tr key={i} className={parseInt(bw.w||0)>=3?'hi':''}>
                      <td style={{fontWeight:600,fontSize:11,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {bw.bowler||'—'}
                      </td>
                      <td className="n">{bw.o||0}</td>
                      <td className="n">{r}</td>
                      <td className="n" style={{fontWeight:700,color:parseInt(bw.w||0)>=3?'var(--gold)':'var(--t1)'}}>{parseInt(bw.w||0)||0}</td>
                      <td className="n" style={{color:'var(--green)'}}>{parseInt(bw.m||0)||0}</td>
                      <td className="n" style={{color:'var(--t3)'}}>{bw.wd||0}</td>
                      <td className="n" style={{color:'var(--or)'}}>
                        {(()=>{
                          const dotMap=liveScore?.dotMap||{};
                          const keys=Object.keys(dotMap);
                          const res=keys.length>0?normalizeName(bw.bowler||'',keys):null;
                          return res?dotMap[res]:'—';
                        })()}
                      </td>
                      <td className="n" style={{fontSize:10,color:eco<7?'var(--green)':eco>10?'var(--red)':'var(--t3)'}}>{(eco||0).toFixed(1)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ── FANTASY STATS TAB ─────────────────────────────────────────
// Shows per-player Dream11 breakdown computed from rawInnings
function PlayerBreakdown({p,ptsMap}){
  const pm=ptsMap?.[p.name]||null;
  const bd=pm?.bd||p.bd||{};
  const bdEntries=Object.entries(bd).filter(([,v])=>v!==0);
  return(
    <div style={{margin:'0 0 0 0',background:'var(--bg3)',borderRadius:'0 0 10px 10px',padding:'8px 12px',fontSize:10,borderTop:'1px solid var(--border)'}}>
      {p.bat&&(
        <div style={{marginBottom:4,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
          <span style={{fontWeight:700,color:'var(--green)'}}>🏏 Bat</span>
          <span style={{fontWeight:600}}>{p.bat.displayR||p.bat.runs||0}({p.bat.displayB||p.bat.b||0}b)</span>
          {(p.bat.displayF4||p.bat.f||0)>0&&<span style={{color:'var(--green)'}}>{p.bat.displayF4||p.bat.f}×4</span>}
          {(p.bat.displayS6||p.bat.s||0)>0&&<span style={{color:'var(--or)'}}>{p.bat.displayS6||p.bat.s}×6</span>}
          {p.bat.duck&&<span style={{color:'var(--red)'}}>🦆</span>}
          {p.bat.dismissal&&p.bat.dismissal!=='not out'&&<span style={{color:'var(--t3)',fontSize:9}}>{p.bat.dismissal}</span>}
        </div>
      )}
      {p.bowl&&(
        <div style={{marginBottom:4,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
          <span style={{fontWeight:700,color:'var(--red)'}}>🎳 Bowl</span>
          <span style={{fontWeight:600}}>{p.bowl.o}ov {p.bowl.rc||p.bowl.r||0}r {p.bowl.w}w</span>
          {(p.bowl.m||0)>0&&<span style={{color:'var(--cyan)'}}>{p.bowl.m}M</span>}
          {(pm?.bowl?.d||p.bowl.d||0)>0&&<span style={{color:'var(--blue)'}}>{pm?.bowl?.d||p.bowl.d} dots</span>}
        </div>
      )}
      {pm?.field&&(pm.field.c>0||pm.field.st>0||pm.field.ro>0)&&(
        <div style={{marginBottom:4,display:'flex',gap:6,flexWrap:'wrap'}}>
          <span style={{fontWeight:700,color:'var(--cyan)'}}>🧤 Field</span>
          {pm.field.c>0&&<span>{pm.field.c} catch</span>}
          {pm.field.st>0&&<span>{pm.field.st} stumping</span>}
          {pm.field.ro>0&&<span>{pm.field.ro} run-out</span>}
        </div>
      )}
      {bdEntries.length>0&&(
        <div style={{borderTop:'1px solid rgba(255,255,255,.06)',paddingTop:4,marginTop:4,display:'flex',flexWrap:'wrap',gap:'3px 10px'}}>
          {bdEntries.map(([k,v])=>(
            <span key={k} style={{fontSize:9,color:v>0?'var(--green)':'var(--red)',fontWeight:600}}>
              {v>0?'+':''}{v} {k}
            </span>
          ))}
          <span style={{fontSize:9,fontWeight:800,color:'var(--or)',marginLeft:4}}>= {p.final||p.total||0} pts</span>
        </div>
      )}
    </div>
  );
}

function StatsTab({match,liveScore,myTeam}){
  const rawInnings=liveScore?.rawInnings||[];
  const ptsMap=liveScore?.ptsMap||{};
  const[expanded,setExpanded]=useState({});
  const toggle=(n)=>setExpanded(e=>({...e,[n]:!e[n]}));

  if(!liveScore||(rawInnings.length===0&&Object.keys(ptsMap).length===0)){
    return(<div className="empty"><div style={{fontSize:36}}>📊</div><div style={{fontWeight:600}}>Stats available after match starts</div></div>);
  }

  // Build display data from rawInnings
  const allPlayers={};
  rawInnings.forEach(inn=>{
    const team=(inn.inning||'').replace(/ Inning [12]/g,'');
    (inn.batting||[]).forEach(b=>{
      const name=b.batsman||''; if(!name) return;
      if(!allPlayers[name]) allPlayers[name]={name,team,bat:null,bowl:null};
      allPlayers[name].bat={
        runs:parseInt(b.r)||0,b:parseInt(b.b)||0,
        f:parseInt(b.f4||b['4s']||0)||0,s:parseInt(b.s6||b['6s']||0)||0,
        displayR:parseInt(b.r)||0,displayB:parseInt(b.b)||0,
        displayF4:parseInt(b.f4||b['4s']||0)||0,displayS6:parseInt(b.s6||b['6s']||0)||0,
        dismissal:String(b.dismissal||'not out'),
        duck:parseInt(b.r||0)===0&&String(b.dismissal||'not out').toLowerCase()!=='not out'&&parseInt(b.b||0)>0
      };
    });
    (inn.bowling||[]).forEach(bw=>{
      const name=bw.bowler||''; if(!name) return;
      if(!allPlayers[name]) allPlayers[name]={name,team,bat:null,bowl:null};
      allPlayers[name].bowl={o:parseFloat(String(bw.o||'0'))||0,rc:parseInt(bw.r||0)||0,w:parseInt(bw.w||0)||0,m:parseInt(bw.m||0)||0,d:0};
    });
  });

  // Build rows - use ptsMap for pts/bd/fielding (authoritative), rawInnings for display
  const rowMap={};
  Object.values(allPlayers).forEach(p=>{
    const pmKey=Object.keys(ptsMap).find(k=>k===p.name||resolvePlayerPid(k)===resolvePlayerPid(p.name));
    const pm=pmKey?ptsMap[pmKey]:null;
    if(pm&&pm.bowl&&pm.bowl.d>0&&p.bowl) p.bowl.d=pm.bowl.d;
    const total=pm?pm.pts:Math.round(((p.bat?score(p.bat,null,'BAT').total:0)+(p.bowl?score(null,p.bowl,'BOWL').total:0))*10)/10;
    const myPl=myTeam?.players?.find(x=>x.name===p.name||resolvePlayerPid(x.name)===resolvePlayerPid(p.name));
    rowMap[p.name]={...p,pm,total,bd:pm?.bd||{},mult:myPl?.isC?2:myPl?.isVC?1.5:1,
      final:Math.round(total*(myPl?.isC?2:myPl?.isVC?1.5:1)*10)/10,
      inMyTeam:!!myPl,isC:myPl?.isC,isVC:myPl?.isVC};
  });
  // Add fielding-only players
  Object.entries(ptsMap).forEach(([name,pm])=>{
    if(rowMap[name]||!pm.field) return;
    if(pm.field.c>0||pm.field.st>0||pm.field.ro>0){
      const myPl=myTeam?.players?.find(x=>x.name===name);
      rowMap[name]={name,team:pm.team||'',bat:null,bowl:null,pm,total:pm.pts,bd:pm.bd||{},
        mult:myPl?.isC?2:myPl?.isVC?1.5:1,final:Math.round(pm.pts*(myPl?.isC?2:myPl?.isVC?1.5:1)*10)/10,
        inMyTeam:!!myPl,isC:myPl?.isC,isVC:myPl?.isVC};
    }
  });
  const rows=Object.values(rowMap).sort((a,b)=>b.total-a.total);
  const hasPtsMap=Object.keys(ptsMap).length>0;

  return(
    <div>
      <div style={{fontSize:10,color:'var(--t3)',marginBottom:8,display:'flex',justifyContent:'space-between'}}>
        <span>Tap player for full breakdown.</span>
        {hasPtsMap?<span style={{color:'var(--green)'}}>✅ Fielding+dots included</span>:<span style={{color:'var(--or)'}}>⚠️ No ptsMap yet</span>}
      </div>
      {rows.map(p=>(
        <div key={p.name} style={{marginBottom:5,borderRadius:10,overflow:'hidden',
          border:`1px solid ${p.inMyTeam?'rgba(249,115,22,.4)':'var(--border)'}`,
          background:p.inMyTeam?'rgba(249,115,22,.04)':'var(--bg2)'}}>
          <div onClick={()=>toggle(p.name)} style={{padding:'9px 12px',display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
                <span style={{fontWeight:700,fontSize:12}}>{p.name}</span>
                {p.isC&&<span className="cb-c cbadge">C</span>}
                {p.isVC&&<span className="cb-vc cbadge">VC</span>}
                {p.inMyTeam&&!p.isC&&!p.isVC&&<span style={{fontSize:8,color:'var(--or)',border:'1px solid rgba(249,115,22,.3)',borderRadius:3,padding:'0 3px'}}>MY XI</span>}
              </div>
              <div style={{fontSize:9,color:'var(--t3)',marginTop:2,display:'flex',gap:8,flexWrap:'wrap'}}>
                <span>{p.team}</span>
                {p.bat&&<span>🏏 {p.bat.displayR}({p.bat.displayB}b) {p.bat.displayF4>0?p.bat.displayF4+'×4':''}{p.bat.displayS6>0?' '+p.bat.displayS6+'×6':''}</span>}
                {p.bowl&&<span>🎳 {p.bowl.w}w {p.bowl.o}ov{p.bowl.d>0?' '+p.bowl.d+'dots':''}</span>}
                {p.pm?.field&&(p.pm.field.c>0||p.pm.field.st>0||p.pm.field.ro>0)&&<span>🧤 {[p.pm.field.c>0&&p.pm.field.c+'c',p.pm.field.st>0&&p.pm.field.st+'st',p.pm.field.ro>0&&p.pm.field.ro+'ro'].filter(Boolean).join(' ')}</span>}
              </div>
            </div>
            <div style={{textAlign:'right',minWidth:44}}>
              <div style={{fontSize:16,fontWeight:800,color:p.total>4?'var(--or)':'var(--t3)'}}>{p.total}</div>
              {p.mult>1&&<div style={{fontSize:9,color:'var(--gold)'}}>→{p.final}</div>}
            </div>
            <span style={{color:'var(--t3)',fontSize:9}}>{expanded[p.name]?'▲':'▼'}</span>
          </div>
          {expanded[p.name]&&<PlayerBreakdown p={p} ptsMap={ptsMap}/>}
        </div>
      ))}
    </div>
  );
}

// ── MY XI TAB ─────────────────────────────────────────────
function MyXITab({match,profile,myTeam,liveScore,locked,loadingTeam,onNav,isWc}){
  const ptsMap=liveScore?.ptsMap||{};
  const ptsMapKeys=Object.keys(ptsMap);
  const[expanded,setExpanded]=useState({});
  // Also subscribe to match_pts for authoritative computed total
  const[myPtsDoc,setMyPtsDoc]=useState(null);
  useEffect(()=>{
    if(!profile?.cvplId&&!profile?.id) return;
    const docKey=match.id+'_'+(profile.cvplId||profile.id);
    const unsub=db.collection('match_pts').doc(docKey)
      .onSnapshot(d=>{if(d.exists)setMyPtsDoc(d.data());else setMyPtsDoc(null);},()=>{});
    return unsub;
  },[match.id,profile?.cvplId,profile?.id]);

  if(loadingTeam) return<div style={{textAlign:'center',padding:24}}><span className="spin"/></div>;

  if(!myTeam&&!locked){
    return(
      <div>
        <div className="info-bar info-blue">Pick your XI before lock time to see your points here</div>
        <button className="btn bor bfull" onClick={()=>onNav('build',match)}>🏏 Pick My Fantasy XI</button>
      </div>
    );
  }
  if(!myTeam&&locked){
    return<div className="info-bar info-red">🔒 Team selection closed — 0 pts this match</div>;
  }

  // Compute from ptsMap using normalizeName for fuzzy matching
  let total=0;
  const playerRows=(myTeam.players||[]).map(p=>{
    // Use authoritative match_pts detail if available, else compute from ptsMap
    const ptDetail=myPtsDoc?.detail?.find(d=>d.name===p.name);
    const resolvedName=normalizeName(p.name,ptsMapKeys);
    const cp=resolvedName?ptsMap[resolvedName]:null;
    const base=ptDetail?.base??cp?.pts??0;
    const mult=p.isC?2:p.isVC?1.5:1;
    const final=ptDetail?.final??Math.round(base*mult*10)/10;
    total+=final;
    return{...p,base,final,mult,bd:cp?.bd||{},bat:cp?.bat||null,bowl:cp?.bowl||null,field:cp?.field||null};
  }).sort((a,b)=>b.final-a.final);
  // Use authoritative total if available
  const displayTotal=myPtsDoc?.pts??total;

  return(
    <div>
      {/* Total pts big number */}
      <div style={{background:'rgba(249,115,22,.06)',border:'1px solid rgba(249,115,22,.25)',borderRadius:12,padding:'14px 16px',textAlign:'center',marginBottom:12}}>
        <div style={{fontSize:10,color:'var(--t3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>
          {profile?.cvplEmoji||"🏏"} {profile?.cvplName||"My Team"} · Fantasy Total
        </div>
        <div className="fm" style={{fontSize:52,fontWeight:800,color:'var(--or)',lineHeight:1}}>{(+(displayTotal||0)).toFixed(1)}</div>
        <div style={{fontSize:11,color:'var(--t3)',marginTop:2}}>pts · C: {myTeam.players?.find(p=>p.isC)?.name||'?'} · VC: {myTeam.players?.find(p=>p.isVC)?.name||'?'}</div>
      </div>

      {/* If WC and no pts yet, explain */}
      {isWc&&Object.keys(ptsMap).length===0&&(
        <div className="info-bar info-gold">Points will calculate once you submit this team</div>
      )}

      {/* Players grouped by role */}
      {[['WK','#60a5fa','Wicket-Keepers'],['BAT','#4ade80','Batters'],['AR','#fb923c','All-Rounders'],['BOWL','#f87171','Bowlers']].map(([role,col,label])=>{
        const group=playerRows.filter(p=>(p.role||'BAT')===role);
        if(!group.length) return null;
        return(
          <div key={role} style={{marginBottom:8,borderRadius:10,overflow:'hidden',border:'1px solid '+col+'33'}}>
            <div style={{background:col+'18',padding:'5px 10px',display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:10,fontWeight:700,color:col,textTransform:'uppercase',letterSpacing:.5}}>{label}</span>
              <span style={{fontSize:10,color:'var(--t3)'}}>{group.length} player{group.length>1?'s':''}</span>
            </div>
            {group.map(p=>(
              <div key={p.name} style={{borderTop:'1px solid var(--border)'}}>
                <div onClick={()=>setExpanded(e=>({...e,[p.name]:!e[p.name]}))}
                  style={{display:'flex',alignItems:'center',padding:'8px 10px',cursor:'pointer',
                    background:p.isC?'rgba(249,115,22,.05)':p.isVC?'rgba(250,204,21,.03)':'transparent'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
                      <span>{p.name}</span>
                      {p.isC&&<span className="cb-c cbadge">C</span>}
                      {p.isVC&&<span className="cb-vc cbadge">VC</span>}
                      {p.subFor&&<span style={{fontSize:9,color:'var(--cyan)',border:'1px solid var(--cyan)',borderRadius:4,padding:'1px 4px'}}>sub for {p.subFor}</span>}
                    </div>
                    {p.base>0&&(
                      <div style={{fontSize:9,color:'var(--t3)',marginTop:2}}>
                        base {p.base}{p.mult>1?<span style={{color:'var(--gold)'}}> ×{p.mult} → {p.final}</span>:''}
                      </div>
                    )}
                  </div>
                  <div style={{textAlign:'right',minWidth:50,display:'flex',alignItems:'center',gap:6}}>
                    {p.mult>1&&<div style={{fontSize:9,color:'var(--gold)',fontWeight:700}}>×{p.mult}</div>}
                    <div style={{fontSize:15,fontWeight:800,
                      color:p.final>0?'var(--green)':p.final<0?'var(--red)':'var(--t3)'
                    }}>{p.final||'–'}</div>
                    <span style={{fontSize:9,color:'var(--t3)'}}>{expanded[p.name]?'▲':'▼'}</span>
                  </div>
                </div>
                {expanded[p.name]&&<PlayerBreakdown p={p} ptsMap={ptsMap}/>}
              </div>
            ))}
          </div>
        );
      })}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
        padding:'10px 12px',background:'rgba(249,115,22,.1)',borderRadius:10,
        border:'1px solid rgba(249,115,22,.3)',marginBottom:12}}>
        <div>
          <div style={{fontSize:10,color:'var(--t3)'}}>C: {myTeam?.players?.find(p=>p.isC)?.name||'–'}  ·  VC: {myTeam?.players?.find(p=>p.isVC)?.name||'–'}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:10,color:'var(--t3)'}}>TOTAL</div>
          <div style={{fontSize:20,fontWeight:800,color:'var(--or)'}}>{(+(displayTotal||0)).toFixed(1)}</div>
        </div>
      </div>

      {/* Backups */}
      {(myTeam?.backups||[]).length>0&&(
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',
            letterSpacing:.5,marginBottom:6}}>Backups</div>
          {(myTeam.backups||[]).map((p,i)=>(
            <div key={p.name} style={{display:'flex',alignItems:'center',padding:'6px 10px',
              border:'1px solid var(--border)',borderRadius:8,marginBottom:4,
              background:'rgba(255,255,255,.02)'}}>
              <span style={{fontSize:10,color:'var(--t3)',minWidth:16,marginRight:6}}>{i+1}</span>
              <span className={`rp rp-${(p.role||'bat').toLowerCase()}`} style={{marginRight:8}}>{p.role}</span>
              <span style={{flex:1,fontSize:12,fontWeight:600}}>{p.name}</span>
              <span style={{fontSize:10,color:'var(--t3)'}}>{p.team}</span>
            </div>
          ))}
        </div>
      )}
      {!locked&&(
        <button className="btn bghost bfull" onClick={()=>onNav('build',match)}>✏️ Edit Team (before lock)</button>
      )}
    </div>
  );
}

// ── INFO TAB ──────────────────────────────────────────────
function InfoTab({match,locked,myTeam,onNav,liveScore,isWc}){
  const allPlayers=useMemo(()=>{
    if(isWc){
      // Build player list from WC scorecard
      const wcData=null;
      if(!wcData) return[];
      const seen=new Set();
      const players=[];
      wcData.innings.forEach(inn=>{
        inn.bat.forEach(b=>{if(!seen.has(b.n)){seen.add(b.n);players.push({name:b.n,role:b.r,team:inn.team,started:true});}});
        inn.bowl.forEach(bw=>{if(!seen.has(bw.n)){seen.add(bw.n);players.push({name:bw.n,role:bw.r,team:inn.team,started:true});}});
      });
      return players;
    }
    const p=[];
    [match.home,match.away].forEach(team=>{(IPL_SQUADS[team]||[]).forEach(pl=>p.push({...pl,team}));});
    return p;
  },[match.id]);

  // For WC: check if there's a starting XI from live_scores (squad pull)
  const startingXI=liveScore?.startingXI||{};

  return(
    <div>
      <div className="card" style={{marginBottom:10}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div>
            <div style={{fontSize:9,color:'var(--t3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:2}}>Date</div>
            <div style={{fontSize:13,fontWeight:600}}>{new Date(match.date+'T12:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'long'})}</div>
            {!isWc&&<div style={{fontSize:12,color:'var(--t2)'}}>{fmtIST(match.lockTime)} IST · Toss time</div>}
          </div>
          <div>
            <div style={{fontSize:9,color:'var(--t3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:2}}>Venue</div>
            <div style={{fontSize:12,lineHeight:1.3}}>{match.venue}</div>
          </div>
        </div>
      </div>

      {match.result&&<div className="info-bar info-green">🏆 {match.result}</div>}
      {isWc&&<div className="info-bar info-gold">🏆 T20 WC 2026 · {match.mult}× league points</div>}
      {!isWc&&!locked&&<div className="info-bar info-blue">🔒 Team lock at {fmtIST(match.lockTime)} IST · Score polling starts 30 min before toss</div>}

      {!locked&&!myTeam&&!isWc&&(
        <button className="btn bor bfull" style={{marginBottom:10}} onClick={()=>onNav('build',match)}>🏏 Pick My Fantasy XI</button>
      )}
      {!locked&&myTeam&&!isWc&&(
        <button className="btn bghost bfull" style={{marginBottom:10}} onClick={()=>onNav('build',match)}>✏️ Edit Team</button>
      )}

      {/* Squad / Starting XI display */}
      <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>
        {isWc?'Playing XI (Actual)':'Squad'}
        {isWc&&<span style={{fontSize:10,color:'var(--green)',marginLeft:6,fontWeight:400}}>✓ All played</span>}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        {(false?[]:
          [match.home,match.away]).map(team=>{
          const players=isWc
            ?[]
            :(IPL_SQUADS[team]||[]);
          return(
            <div key={team} className="card" style={{padding:'10px'}}>
              <div className="fd" style={{fontSize:15,color:TC[team]||'var(--or)',marginBottom:6}}>{team}</div>
              {players.map(p=>(
                <div key={p.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0',borderBottom:'1px solid var(--border)',fontSize:11}}>
                  <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:90,fontSize:11}}>
                    {isWc&&<span style={{color:'var(--green)',marginRight:3}}>●</span>}
                    {p.name}
                  </span>
                  <span className={`rp rp-${(p.role||'bat').toLowerCase()}`}>{p.role}</span>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// BUILD FLOW — 3 steps: Pick XI → Backups → C/VC
// ═══════════════════════════════════════════════════════════
function BuildFlow({match,profile,onNav}){
  const[step,setStep]=useState(1);
  const[sel,setSel]=useState([]);
  const[bks,setBks]=useState([]);
  const[cap,setCap]=useState(null);
  const[vc,setVc]=useState(null);
  const[saving,setSaving]=useState(false);
  const[startingXI,setStartingXI]=useState({});
  const[statsTs,setStatsTs]=useState(0); // bumped when player stats load/update
  const isWc=match.type==='wc';

  // Subscribe to live_scores for playing XI data
  useEffect(()=>{
    const unsub=db.collection('live_scores').doc(match.id)
      .onSnapshot(d=>{if(d.exists&&d.data().startingXI) setStartingXI(d.data().startingXI||{});});
    return unsub;
  },[match.id]);

  // Listen for player stats loaded/updated — bump statsTs to re-render player list
  useEffect(()=>{
    // Initial bump after startup load completes
    const t=setTimeout(()=>setStatsTs(Date.now()),1500);
    // Also subscribe to players collection for live updates
    const unsub=db.collection('players').limit(1)
      .onSnapshot(()=>setStatsTs(Date.now()),()=>{});
    return()=>{clearTimeout(t);unsub();};
  },[]);

  // Subscribe to dynamic squads from Firestore (auto-discovered players added by engine)
  const[dynamicSquads,setDynamicSquads]=useState({});
  useEffect(()=>{
    const teams=[match.home,match.away];
    const unsubs=teams.map(team=>
      db.collection('squads').doc(team).onSnapshot(d=>{
        if(d.exists&&d.data().players){
          setDynamicSquads(prev=>({...prev,[team]:d.data().players||[]}));
        }
      },()=>{})
    );
    return()=>unsubs.forEach(u=>u());
  },[match.home,match.away]);

  useEffect(()=>{
    // Load from cvplId key (new) or uid key (old fallback)
    const loadKey=match.id+'_'+(profile.cvplId||profile.id);
    const loadDoc=async(key)=>{
      const d=await db.collection('teams').doc(key).get();
      if(d.exists){
        const t=d.data();
        setSel((t.players||[]).map(p=>({name:p.name,role:p.role,team:p.team})));
        setBks(t.backups||[]);
        setCap(t.players?.find(p=>p.isC)||null);
        setVc(t.players?.find(p=>p.isVC)||null);
        return true;
      }
      return false;
    };
    loadDoc(loadKey).then(found=>{
      if(!found&&profile.cvplId&&profile.cvplId!==profile.id){
        loadDoc(match.id+'_'+profile.id); // fallback to uid key
      }
    });
  },[match.id,profile.id]);

  // Build player list from IPL squads or WC scorecard
  const allPlayers=useMemo(()=>{
    const players=[];
    const seen=new Set();
    [match.home,match.away].forEach(team=>{
      // Start with hardcoded squad
      (IPL_SQUADS[team]||[]).forEach(p=>{
        if(!seen.has(p.name)){seen.add(p.name);players.push({...p,team});}
      });
      // Merge dynamic squad from Firestore (new signings, discovered players)
      (dynamicSquads[team]||[]).forEach(p=>{
        if(!seen.has(p.name)){
          seen.add(p.name);
          players.push({...p,team,discovered:true}); // discovered players shown with ⚡
        }
      });
    });
    // Attach live IPL 2026 stats from Firestore players collection
    return players.map(p=>{
      const stats=getPlayerStats(p.name);
      return{
        ...p,
        totalPts: stats.totalPts||0,
        avgPts: stats.avgPts||0,
        matchCount: stats.matchCount||0,
        lastMatchPts: stats.lastMatchPts||0,
        lastGame: stats.playedLastMatch||false,
        injured: p.injured||false,
      };
    });
  },[match.id,match.home,match.away,isWc,dynamicSquads,statsTs]);

  const validate=()=>{
    if(sel.length!==11) return`Need exactly 11 (have ${sel.length})`;
    if(!sel.some(p=>p.role==='WK')) return'Need at least 1 WK';
    if(!sel.some(p=>p.role==='BAT')) return'Need at least 1 BAT';
    if(!sel.some(p=>p.role==='AR')) return'Need at least 1 AR';
    if(!sel.some(p=>p.role==='BOWL')) return'Need at least 1 BOWL';
    return null;
  };

  const confirm=async()=>{
    if(!cap||!vc){toast('Set Captain and Vice-Captain','e');return;}
    setSaving(true);
    try{
      const players=sel.map(p=>({
        name:p.name||'',role:p.role||'BAT',team:p.team||'',
        isC:p.name===cap.name,isVC:p.name===vc.name,
      }));
      const backups=(bks||[]).map((b,i)=>({name:b.name||'',role:b.role||'BAT',team:b.team||'',priority:i+1}));
      await saveTeamToFirebase(match.id,profile.id,{
        players,backups,
        captain:{name:cap.name,role:cap.role||'BAT',team:cap.team||''},
        viceCaptain:{name:vc.name,role:vc.role||'BAT',team:vc.team||''},
        cvplId:profile.cvplId||'',cvplName:profile.cvplName||'',cvplEmoji:profile.cvplEmoji||'🏏',
        matchNum:String(match.num||''),home:match.home||'',away:match.away||'',
        matchType:match.type||'ipl',
      });

      toast('Team saved! 🏏 Points will update live once match starts','s');
      onNav('match',match);
    }catch(e){toast(e.message,'e');}
    setSaving(false);
  };

  const prog=step===1?33:step===2?66:100;

  return(
    <div className="scr">
      <div className="sh">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button className="back-btn" onClick={()=>step>1?setStep(s=>s-1):onNav('home')}>←</button>
          <div style={{flex:1}}>
            <div style={{fontSize:10,color:'var(--t3)',textTransform:'uppercase',letterSpacing:.3}}>
              Step {step}/3 · {step===1?'Pick 11 Players':step===2?'Set Backups (optional)':'Captain & Vice-Captain'}
            </div>
            <div className="fd" style={{fontSize:17}}>
              <span style={{color:TC[match.home]}}>{match.home}</span> vs <span style={{color:TC[match.away]}}>{match.away}</span>
            </div>
          </div>
        </div>
        <div className="prog"><div className="progf" style={{width:prog+'%'}}/></div>
      </div>

      <div className="page" style={{paddingTop:10}}>
        {step===1&&<Step1 match={match} all={allPlayers} sel={sel} setSel={setSel} cap={cap} setCap={setCap} vc={vc} setVc={setVc} validate={validate} onNext={()=>setStep(2)} isWc={isWc} startingXI={startingXI} profile={profile}/>}
        {step===2&&<Step2 all={allPlayers} sel={sel} bks={bks} setBks={setBks} onNext={()=>setStep(3)} onSkip={()=>setStep(3)}/>}
        {step===3&&<Step3 sel={sel} cap={cap} vc={vc} setCap={setCap} setVc={setVc} onConfirm={confirm} saving={saving}/>}
      </div>
    </div>
  );
}

// Add player not in squad list (e.g. Muzarabani, new signings)
// Admin XI marker — shows as a status row on each player card in Step1
// Single tap cycles: unmarked → playing → impact → bench → unmarked
function AdminXIQuickMark({match, startingXI}){
  const[open,setOpen]=useState(false);
  const[saving,setSaving]=useState('');
  const playing=Object.values(startingXI||{}).filter(v=>v==='playing').length;
  const impact=Object.values(startingXI||{}).filter(v=>v==='impact').length;
  const bench=Object.values(startingXI||{}).filter(v=>v==='bench').length;
  const total=playing+impact+bench;

  const mark=async(pname, status)=>{
    setSaving(pname);
    const xi={...(startingXI||{})};
    if(status===null) delete xi[pname]; else xi[pname]=status;
    try{
      await db.collection('live_scores').doc(match.id)
        .set({startingXI:xi,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    }catch(e){toast(e.message,'e');}
    setSaving('');
  };

  const cycleStatus=(pname)=>{
    const cur=(startingXI||{})[pname]||null;
    const next=cur===null?'playing':cur==='playing'?'impact':cur==='impact'?'bench':null;
    mark(pname, next);
  };

  const teams=[match.home, match.away];

  return(
    <div style={{marginBottom:8,borderRadius:10,overflow:'hidden',border:'1px solid rgba(249,115,22,.25)'}}>
      <button onClick={()=>setOpen(o=>!o)} style={{
        width:'100%',background:'rgba(249,115,22,.07)',border:'none',cursor:'pointer',
        padding:'9px 12px',display:'flex',justifyContent:'space-between',alignItems:'center'
      }}>
        <span style={{fontSize:12,fontWeight:700,color:'var(--or)'}}>👥 Mark Playing XI</span>
        <span style={{fontSize:11,color:'var(--t3)'}}>
          {total>0
            ? <>{playing>0&&<><span style={{color:'var(--green)'}}>✅{playing}</span>{' '}</>}{impact>0&&<><span style={{color:'var(--or)'}}>⚡{impact}</span>{' '}</>}{bench>0&&<span style={{color:'var(--red)'}}>❌{bench}</span>}</>
            : 'Not marked'}
          {' '}{open?'▲':'▼'}
        </span>
      </button>
      {open&&(
        <div style={{background:'var(--bg2)',padding:'6px 8px'}}>
          <div style={{fontSize:9,color:'var(--t3)',marginBottom:6,lineHeight:1.4}}>
            Tap a player to cycle: ✅ playing → ⚡ impact → ❌ bench → clear
          </div>
          {teams.map(team=>(
            <div key={team} style={{marginBottom:8}}>
              <div style={{fontSize:10,fontWeight:700,color:TC[team]||'var(--or)',marginBottom:4,padding:'2px 4px'}}>{team}</div>
              {(IPL_SQUADS[team]||[]).map(p=>{
                const st=(startingXI||{})[p.name]||null;
                const isSaving=saving===p.name;
                const bg=st==='playing'?'rgba(34,197,94,.15)':st==='impact'?'rgba(249,115,22,.15)':st==='bench'?'rgba(239,68,68,.1)':'transparent';
                const icon=st==='playing'?'✅':st==='impact'?'⚡':st==='bench'?'❌':'○';
                const nameShort=p.name;
                return(
                  <button key={p.name} onClick={()=>!isSaving&&cycleStatus(p.name)} style={{
                    display:'inline-flex',alignItems:'center',gap:4,margin:'2px 3px',
                    padding:'4px 8px',borderRadius:16,border:'1px solid '+(
                      st==='playing'?'rgba(34,197,94,.4)':st==='impact'?'rgba(249,115,22,.4)':
                      st==='bench'?'rgba(239,68,68,.3)':'var(--border)'),
                    background:bg,cursor:'pointer',fontSize:11,fontWeight:600,
                    color:st?'var(--t1)':'var(--t3)',
                    transition:'all .15s'
                  }}>
                    {isSaving?<span className="spin" style={{width:10,height:10}}/>:<span>{icon}</span>}
                    <span>{nameShort}</span>
                  </button>
                );
              })}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


function AddUnknownPlayer({sel,setSel,match}){
  const[show,setShow]=useState(false);
  const[name,setName]=useState('');
  const[role,setRole]=useState('BOWL');
  const[team,setTeam]=useState(match.home);
  if(!show) return(
    <div style={{textAlign:'center',marginBottom:8}}>
      <button className="btn bghost bsm" style={{fontSize:10}} onClick={()=>setShow(true)}>
        + Add unlisted player
      </button>
    </div>
  );
  const add=()=>{
    if(!name.trim()){toast('Enter player name','e');return;}
    if(sel.find(s=>s.name===name.trim())){toast('Already in XI','e');return;}
    if(sel.length>=11){toast('XI is full','e');return;}
    setSel(s=>[...s,{name:name.trim(),role,team}]);
    setName('');setShow(false);
    toast(name.trim()+' added ✓','s');
  };
  return(
    <div style={{background:'var(--bg3)',borderRadius:10,padding:'10px 12px',marginBottom:8,border:'1px dashed var(--border2)'}}>
      <div style={{fontSize:11,fontWeight:700,marginBottom:8}}>Add unlisted player (e.g. new signing / impact sub)</div>
      <input className="inp" style={{marginBottom:6}} placeholder="Full name e.g. Blessing Muzarabani"
        value={name} onChange={e=>setName(e.target.value)}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:8}}>
        <div>
          <label className="inpl">Role</label>
          <select className="inp" value={role} onChange={e=>setRole(e.target.value)}>
            {['BAT','BOWL','AR','WK'].map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        </div>
        <div>
          <label className="inpl">Team</label>
          <select className="inp" value={team} onChange={e=>setTeam(e.target.value)}>
            <option value={match.home}>{match.home}</option>
            <option value={match.away}>{match.away}</option>
          </select>
        </div>
      </div>
      <div style={{display:'flex',gap:6}}>
        <button className="btn bor" style={{flex:1}} onClick={add}>✓ Add to XI</button>
        <button className="btn bghost" onClick={()=>setShow(false)}>✕</button>
      </div>
    </div>
  );
}


// Get XI status for a player from startingXI map
function xiStatus_of(p,startingXI){
  if(!startingXI||Object.keys(startingXI).length===0) return null;
  const keys=Object.keys(startingXI);
  const resolved=normalizeName(p.name,keys);
  return resolved?startingXI[resolved]:null;
}


function Step1({match,all,sel,setSel,cap,setCap,vc,setVc,validate,onNext,isWc,startingXI,profile}){
  const[tf,setTf]=useState('ALL');
  const[rf,setRf]=useState('ALL');
  const[showFilter,setShowFilter]=useState('all'); // all/starting/bench
  const rc=sel.reduce((a,p)=>({...a,[p.role]:(a[p.role]||0)+1}),{});
  const err=validate();

  const filtered=all.filter(p=>{
    const teamOk=tf==='ALL'||p.team===tf;
    const roleOk=rf==='ALL'||p.role===rf;
    const startOk=showFilter==='all'||(showFilter==='starting'&&p.started)||(showFilter==='bench'&&!p.started);
    return teamOk&&roleOk&&startOk;
  }).sort((a,b)=>{
    // 1. XI status (playing > unknown > bench)
    const aXI=xiStatus_of(a,startingXI);const bXI=xiStatus_of(b,startingXI);
    const xScore=x=>x==='playing'?0:x==='impact'?1:x==='bench'?3:2;
    if(xScore(aXI)!==xScore(bXI)) return xScore(aXI)-xScore(bXI);
    // 2. Played last match (●LM) first
    if((b.lastGame?1:0)!==(a.lastGame?1:0)) return (b.lastGame?1:0)-(a.lastGame?1:0);
    // 3. Total pts descending (DNP = 0, goes to bottom naturally)
    return (b.totalPts||0)-(a.totalPts||0);
  });

  const toggle=p=>{
    if(sel.find(s=>s.name===p.name)){
      setSel(s=>s.filter(x=>x.name!==p.name));
      if(cap?.name===p.name)setCap(null);
      if(vc?.name===p.name)setVc(null);
    }else{
      if(sel.length>=11){toast('Max 11 players','e');return;}
      setSel(s=>[...s,p]);
    }
  };

  const hasStartingData=all.some(p=>p.started!==undefined)||Object.keys(startingXI).length>0;
  // Count from XI data (API pull) or squad data
  const startingCount=Object.keys(startingXI).length>0
    ?all.filter(p=>xiStatus_of(p,startingXI)==='playing').length
    :all.filter(p=>p.started).length;

  return(
    <div>
      <div className="pick-bar">
        {/* Dream11-style slot dots */}
        <div style={{display:'flex',gap:3,marginBottom:4}}>
          {Array.from({length:11},(_,i)=>{
            const p=sel[i];
            const roleColor=p?{WK:'#60a5fa',BAT:'#4ade80',AR:'#fb923c',BOWL:'#f87171'}[p.role]||'#fb923c':'rgba(255,255,255,.1)';
            return <div key={i} title={p?p.name:''} style={{flex:1,height:5,borderRadius:3,background:roleColor,transition:'background .2s'}}/>;
          })}
        </div>
        {/* Role pills row */}
        <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontSize:13,fontWeight:800,color:sel.length===11?'#4ade80':'#fb923c',minWidth:32}}>{sel.length}/11</span>
          {[['WK','#60a5fa'],['BAT','#4ade80'],['AR','#fb923c'],['BOWL','#f87171']].map(([r,col])=>(
            <span key={r} style={{
              fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:10,
              background:(rc[r]||0)>=1?col+'30':'rgba(255,255,255,.05)',
              color:(rc[r]||0)>=1?col:'var(--t3)',
              border:'1px solid '+((rc[r]||0)>=1?col+'80':'rgba(255,255,255,.08)')
            }}>{rc[r]||0} {r}</span>
          ))}
          {/* Per-team count */}
          {[match.home,match.away].map(team=>{
            const cnt=sel.filter(p=>p.team===team).length;
            return <span key={team} style={{
              fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:10,
              background:cnt>0?TC[team]+'25':'rgba(255,255,255,.05)',
              color:cnt>0?TC[team]||'var(--or)':'var(--t3)',
              border:'1px solid '+(cnt>0?(TC[team]||'var(--or)')+'55':'rgba(255,255,255,.08)')
            }}>{team} {cnt}</span>;
          })}
          <span style={{marginLeft:'auto',fontSize:11,color:err?'#f87171':'#4ade80',fontWeight:600}}>{err||'✓ Valid'}</span>
        </div>
      </div>
            {/* Starting XI status banner */}
      {isWc&&(
        <div className="info-bar info-gold" style={{marginBottom:8}}>
          ● = Played in this WC match. All {startingCount} shown are confirmed playing XI.
        </div>
      )}
      {!isWc&&hasStartingData&&(
        <div className="info-bar info-green" style={{marginBottom:8}}>
          ● Playing XI confirmed! {startingCount} players confirmed. Grey = not in XI / DNP.
        </div>
      )}
      {!isWc&&!hasStartingData&&(
        <div style={{background:'rgba(100,116,139,.08)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 10px',marginBottom:8,fontSize:11,color:'var(--t3)'}}>
          ⏰ Playing XI announced closer to toss. Until then all squad members shown.
        </div>
      )}

      {/* Team filter */}
      <div className="tabs" style={{marginBottom:6}}>
        {['ALL',match.home,match.away].map(t=>(
          <button key={t} className={`tab ${tf===t?'act':''}`} onClick={()=>setTf(t)}
            style={{color:tf===t&&t!=='ALL'?(TC[t]||'var(--or)'):'inherit'}}>
            {t==='ALL'?'Both':t}
          </button>
        ))}
      </div>
      {/* Role filter */}
      <div className="tabs" style={{marginBottom:hasStartingData?6:0}}>
        {['ALL','WK','BAT','AR','BOWL'].map(r=>(
          <button key={r} className={`tab ${rf===r?'act':''}`} onClick={()=>setRf(r)}>{r}</button>
        ))}
      </div>
      {/* Playing XI filter — shows when XI data available */}
      {(hasStartingData||Object.keys(startingXI).length>0)&&(
        <div className="tabs">
          <button className={`tab ${showFilter==='all'?'act':''}`} onClick={()=>setShowFilter('all')}>All</button>
          <button className={`tab ${showFilter==='starting'?'act':''}`} onClick={()=>setShowFilter('starting')}
            style={{fontWeight:700}}>
            ✅ Playing XI ({startingCount||Object.values(startingXI).filter(v=>v==='playing').length})
          </button>
          <button className={`tab ${showFilter==='bench'?'act':''}`} onClick={()=>setShowFilter('bench')}>
            ❌ Bench
          </button>
        </div>
      )}
      {/* Sort label */}
      <div style={{fontSize:9,color:'var(--t3)',textAlign:'right',marginBottom:4,marginTop:2}}>
        {Object.keys(startingXI).length>0&&<span>XI ✅ → </span>}●LM → total pts · DNP = no games yet
      </div>

      {/* Admin: mark playing XI before toss */}
      {profile?.isAdmin&&(
        <AdminXIQuickMark match={match} startingXI={startingXI}/>
      )}

      {/* Add unknown player */}
      <AddUnknownPlayer sel={sel} setSel={setSel} match={match}/>

      <div style={{maxHeight:380,overflowY:'auto',marginBottom:10}}>
        {filtered.map(p=>{
          const inXI=!!sel.find(s=>s.name===p.name);
          const isStarting=p.started===true;
          const isNotStarting=p.started===false;
          // Check startingXI from API pull
          const xiStatus=xiStatus_of(p,startingXI);
          return(
            <div key={p.name} className={`pc ${inXI?'sel':''}`} onClick={()=>toggle(p)}
              style={{opacity:(xiStatus==='bench'||(!xiStatus&&isNotStarting))?0.4:1}}>
              <div className="team-stripe" style={{background:TC[p.team]||'var(--or)'}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:5}}>
                  {xiStatus==='playing'&&<span style={{color:'var(--green)',fontSize:10,flexShrink:0}} title="Playing">✅</span>}
                  {xiStatus==='bench'&&<span style={{color:'var(--red)',fontSize:10,flexShrink:0}} title="Not playing">❌</span>}
                  {xiStatus==='impact'&&<span style={{color:'var(--or)',fontSize:10,flexShrink:0}} title="Impact sub">⚡</span>}
                  {!xiStatus&&isStarting&&<span style={{color:'var(--green)',fontSize:10,flexShrink:0}}>●</span>}
                  {!xiStatus&&isNotStarting&&<span style={{color:'var(--t3)',fontSize:10,flexShrink:0}}>○</span>}
                  <span className="pn">{p.discovered?'⚡ ':''}{p.name}</span>
                </div>
                <div className="pm">
                  <span className={`rp rp-${p.role.toLowerCase()}`}>{p.role}</span>
                  <span style={{color:TC[p.team]||'var(--t3)',fontWeight:600,fontSize:10}}>{p.team}</span>
                  {p.injured&&<span style={{fontSize:9,color:'var(--red)',fontWeight:700}}>🚑</span>}
                  {p.lastGame&&xiStatus!=='bench'&&(
                    <span style={{fontSize:9,color:'var(--blue)',fontWeight:700}}>●LM</span>
                  )}
                  {xiStatus==='playing'&&<span style={{fontSize:9,color:'var(--green)',fontWeight:700}}>✅</span>}
                  {xiStatus==='bench'&&<span style={{fontSize:9,color:'var(--red)',fontWeight:600}}>❌ DNP</span>}
                  {(!xiStatus&&isNotStarting)&&<span style={{fontSize:9,color:'var(--red)'}}>DNP</span>}
                  {xiStatus==='impact'&&<span style={{fontSize:9,color:'var(--or)',fontWeight:600}}>⚡</span>}
                </div>
              </div>
              <div style={{minWidth:32,textAlign:'center',flexShrink:0}}>
                {p.matchCount>0
                  ?<div style={{fontSize:11,fontWeight:800,lineHeight:1,
                      color:p.totalPts>=100?'var(--green)':p.totalPts>=50?'var(--or)':'var(--t3)'}}>
                      {p.totalPts}
                    </div>
                  :<div style={{fontSize:8,fontWeight:700,color:'var(--t3)',lineHeight:1}}>DNP</div>
                }
                <div style={{fontSize:16,color:inXI?'var(--or)':'var(--border2)',lineHeight:1.2}}>{inXI?'✓':'+'}</div>
              </div>
            </div>
          );
        })}
        {filtered.length===0&&<div className="empty" style={{padding:20}}><div>No players in this filter</div></div>}
      </div>

      <div style={{position:'sticky',bottom:0,paddingTop:8,paddingBottom:4,background:'var(--bg)'}}>
        <button className="btn bor bfull" disabled={!!err} onClick={onNext}>Next: Backups →</button>
      </div>
    </div>
  );
}

function Step2({all,sel,bks,setBks,onNext,onSkip}){
  const selIds=new Set(sel.map(p=>p.name));
  const avail=all.filter(p=>!selIds.has(p.name));

  const toggleBk=p=>{
    if(bks.find(b=>b.name===p.name)){setBks(b=>b.filter(x=>x.name!==p.name));return;}
    if(bks.length>=4){toast('Max 4 backups','e');return;}
    setBks(b=>[...b,{...p,priority:b.length+1}]);
  };

  return(
    <div>
      <div className="info-bar info-blue">
        🛡️ Backups auto-replace DNP players after toss (B1 first). Optional — max 4.
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span className="sl" style={{margin:0}}>Backups ({bks.length}/4)</span>
        <button className="btn bghost bsm" onClick={onSkip}>Skip →</button>
      </div>
      {bks.map((b,i)=>(
        <div key={b.name} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'var(--bg3)',border:'1px dashed var(--border2)',borderRadius:8,marginBottom:5}}>
          <div className="fd" style={{fontSize:15,color:'var(--or)',width:22}}>B{i+1}</div>
          <div style={{flex:1,fontSize:12,fontWeight:600}}>{b.name}</div>
          <span className={`rp rp-${b.role.toLowerCase()}`}>{b.role}</span>
          <button style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:13}} onClick={()=>toggleBk(b)}>✕</button>
        </div>
      ))}
      <span className="sl" style={{marginTop:10}}>Available</span>
      <div style={{maxHeight:360,overflowY:'auto',marginBottom:10}}>
        {avail.map(p=>{
          const inBk=!!bks.find(b=>b.name===p.name);
          return(
            <div key={p.name} className={`pc ${inBk?'sel':''}`} onClick={()=>toggleBk(p)}>
              <div className="team-stripe" style={{background:TC[p.team]||'var(--or)'}}/>
              <div style={{flex:1,minWidth:0}}>
                <span className="pn">{p.name}</span>
                <div className="pm"><span className={`rp rp-${p.role.toLowerCase()}`}>{p.role}</span><span style={{color:'var(--t3)'}}>{p.team}</span></div>
              </div>
              <div style={{fontSize:13,color:inBk?'var(--green)':'var(--border2)',minWidth:30,textAlign:'center'}}>
                {inBk?`B${bks.findIndex(b=>b.name===p.name)+1}`:'+'}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{position:'sticky',bottom:0,paddingTop:8,paddingBottom:4,background:'var(--bg)'}}>
        <button className="btn bor bfull" onClick={onNext}>Next: Captain & VC →</button>
      </div>
    </div>
  );
}

// Simple raw scorecard fetcher — no complex JSX, just dumps to console + Firestore
function RawScorecardTest(){
  const[status,setStatus]=useState('');
  const[midx,setMidx]=useState(0);
  const matches=SCHEDULE.filter(m=>m.type==='ipl').slice(0,10);
  const go=async()=>{
    const m=matches[midx];
    setStatus('Fetching... (1 API hit)');
    try{
      const r=await fetch(CAPI+'/match_scorecard?apikey='+CAPI_KEY+'&id='+m.apiMatchId);
      const d=await r.json();
      if(d.status!=='success'){
        setStatus('API Error: '+d.reason);
        return;
      }
      const data=d.data||{};
      const sc=data.scorecard||data.score_card||[];
      const inn0=sc[0]||{};
      const bat0=inn0.batting||inn0.bat||[];
      const bowl0=inn0.bowling||inn0.bowl||[];
      const info={
        matchName:data.name,
        apiStatus:data.status,
        hitsToday:d.info?.hitsToday,
        scorecardKey:data.scorecard?'scorecard':data.score_card?'score_card':'NOT FOUND',
        innings:sc.length,
        inning0:inn0.inning||inn0.team,
        batters:bat0.length,
        batter0:bat0[0]?JSON.stringify(bat0[0]).slice(0,200):null,
        bowlers:bowl0.length,
        bowler0:bowl0[0]?JSON.stringify(bowl0[0]).slice(0,200):null,
      };
      const txt=JSON.stringify(info,null,2);
      setStatus(txt);
      // Save to Firestore for later inspection
      await db.collection('live_scores').doc('_debug').set({
        matchId:m.id,info,raw:JSON.stringify(data).slice(0,30000),
        ts:firebase.firestore.FieldValue.serverTimestamp()
      });
      console.log('[Debug] Full raw saved to Firestore live_scores/_debug');
    }catch(e){setStatus('Error: '+e.message);}
  };
  return(
    <div style={{marginBottom:12}}>
      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <select className="inp" style={{flex:1,fontSize:11}} value={midx}
          onChange={e=>setMidx(Number(e.target.value))}>
          {matches.map((m,i)=>(
            <option key={m.id} value={i}>M{m.num} {m.home} vs {m.away}</option>
          ))}
        </select>
        <button className="btn bor bsm" onClick={go}>🔬 Fetch Raw (1 hit)</button>
      </div>
      {status&&(
        <div style={{background:'#050810',borderRadius:8,padding:'10px',
          fontFamily:'Courier New',fontSize:9,color:'#86efac',lineHeight:1.8,
          maxHeight:250,overflowY:'auto',whiteSpace:'pre-wrap',userSelect:'all'}}>
          {status}
        </div>
      )}
    </div>
  );
}


// ── API Key Dashboard — fully automatic, shows all keys in pool ───────────────
function ApiKeyDashboard(){
  const[pool,setPool]=useState(_keyPool);
  const[hits,setHits]=useState({});
  const[newKey,setNewKey]=useState('');
  const[newLabel,setNewLabel]=useState('');
  const[adding,setAdding]=useState(false);
  const[showAdd,setShowAdd]=useState(false);

  // Refresh pool and hits every 5 seconds
  useEffect(()=>{
    const refresh=()=>{
      setPool([..._keyPool]);
      const today=new Date().toISOString().slice(0,10);
      const h={};
      _keyPool.forEach(({key})=>{h[key.slice(0,8)]=_getHits(key.slice(0,8));});
      setHits(h);
      // Also merge Firestore hits
      _keyPool.forEach(({key})=>{
        db.collection('_meta').doc('hits_'+today+'_'+key.slice(0,8)).get()
          .then(d=>{
            if(d.exists){
              const fsHits=d.data().hits||0;
              const lsHits=_getHits(key.slice(0,8));
              const best=Math.max(fsHits,lsHits);
              try{localStorage.setItem('cvpl_hits_'+today+'_'+key.slice(0,8),String(best));}catch{}
              setHits(prev=>({...prev,[key.slice(0,8)]:best}));
            }
          }).catch(()=>{});
      });
    };
    refresh();
    const iv=setInterval(refresh,5000);
    return()=>clearInterval(iv);
  },[]);

  const addKey=async()=>{
    if(!newKey.trim()||newKey.trim().length<20){toast('Enter a valid API key','e');return;}
    setAdding(true);
    const label=newLabel.trim()||('Key '+(pool.length+1));
    const entry={key:newKey.trim(),label};
    // Add to in-memory pool immediately
    _keyPool.push(entry);
    setPool([..._keyPool]);
    // Persist to Firestore so all devices get it
    try{
      const existing=(await db.collection('_meta').doc('apiKeys').get());
      const cur=existing.exists?(existing.data().keys||[]):[];
      await db.collection('_meta').doc('apiKeys').set(
        {keys:[...cur,entry],updatedAt:firebase.firestore.FieldValue.serverTimestamp()},
        {merge:true}
      );
      toast(label+' added ✓ — auto-rotation will use it','s');
    }catch(e){toast(e.message,'e');}
    setNewKey('');setNewLabel('');setShowAdd(false);setAdding(false);
  };

  const removeKey=async(keyToRemove)=>{
    _keyPool=_keyPool.filter(k=>k.key!==keyToRemove);
    setPool([..._keyPool]);
    try{
      await db.collection('_meta').doc('apiKeys').set(
        {keys:_keyPool.filter(k=>!CAPI_KEYS_BUILTIN.find(b=>b.key===k.key)),
         updatedAt:firebase.firestore.FieldValue.serverTimestamp()},
        {merge:true}
      );
    }catch(e){}
    // Re-pick best key
    _activeKeyIdx=_pickBestKey();
    CAPI_KEY=_keyPool[_activeKeyIdx]?.key||CAPI_KEY;
    toast('Key removed','s');
  };

  const totalHitsToday=Object.values(hits).reduce((a,b)=>a+b,0);
  const keysAvailable=pool.filter(k=>(_getHits(k.key.slice(0,8)))<CREDIT_LIMIT).length;

  return(
    <div style={{marginBottom:10}}>
      {/* Summary bar */}
      <div style={{display:'flex',gap:10,background:'var(--bg3)',borderRadius:8,
        padding:'8px 12px',marginBottom:8,fontSize:11,alignItems:'center'}}>
        <span>🔑 <strong style={{color:'var(--or)'}}>{pool.length}</strong> keys</span>
        <span>✅ <strong style={{color:'var(--green)'}}>{keysAvailable}</strong> available</span>
        <span>📡 <strong style={{color:'var(--blue)'}}>{totalHitsToday}</strong> hits today</span>
        <button className="btn bsm bghost" style={{marginLeft:'auto',fontSize:10}}
          onClick={()=>setShowAdd(s=>!s)}>
          {showAdd?'✕ Cancel':'+ Add Key'}
        </button>
      </div>

      {/* Add key form */}
      {showAdd&&(
        <div style={{background:'var(--bg3)',borderRadius:10,padding:'10px 12px',marginBottom:8,
          border:'1px dashed var(--border2)'}}>
          <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>Add API Key</div>
          <input className="inp" style={{marginBottom:6}} placeholder="API key (from cricapi.com/profile)"
            value={newKey} onChange={e=>setNewKey(e.target.value)}/>
          <input className="inp" style={{marginBottom:8}} placeholder="Label e.g. Key 4 (optional)"
            value={newLabel} onChange={e=>setNewLabel(e.target.value)}/>
          <button className="btn bor bfull" disabled={adding} onClick={addKey}>
            {adding?<><span className="spin"/> Saving...</>:'Add to pool'}
          </button>
          <div style={{fontSize:9,color:'var(--t3)',marginTop:4}}>
            Get free keys at cricapi.com → My Account → API Keys. Each key = 100 credits/day.
          </div>
        </div>
      )}

      {/* Key cards */}
      {pool.map(({key,label})=>{
        const k8=key.slice(0,8);
        const used=hits[k8]||0;
        const pct=Math.min(100,Math.round(used/CREDIT_LIMIT*100));
        const isActive=CAPI_KEY===key;
        const isExhausted=used>=CREDIT_LIMIT;
        const isBuiltin=CAPI_KEYS_BUILTIN.some(b=>b.key===key);
        return(
          <div key={key} style={{padding:'8px 12px',marginBottom:6,borderRadius:10,
            border:`1px solid ${isActive?'rgba(249,115,22,.5)':isExhausted?'rgba(239,68,68,.3)':'var(--border)'}`,
            background:isActive?'rgba(249,115,22,.05)':isExhausted?'rgba(239,68,68,.04)':'var(--bg2)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
              <div style={{flex:1}}>
                <span style={{fontWeight:700,fontSize:11}}>{label}</span>
                {isActive&&<span style={{fontSize:9,background:'rgba(249,115,22,.2)',color:'var(--or)',
                  borderRadius:4,padding:'1px 5px',marginLeft:6}}>AUTO-ACTIVE</span>}
                {isExhausted&&<span style={{fontSize:9,color:'var(--red)',marginLeft:6}}>exhausted</span>}
                <div style={{fontSize:9,color:'var(--t3)',fontFamily:'Courier New'}}>{k8}...</div>
              </div>
              <div style={{textAlign:'right'}}>
                <span style={{fontSize:18,fontWeight:800,
                  color:isExhausted?'var(--red)':used>=70?'var(--or)':'var(--green)'}}>
                  {used}
                </span>
                <span style={{fontSize:10,color:'var(--t3)'}}>/100</span>
              </div>
              {!isBuiltin&&(
                <button style={{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',
                  fontSize:12,padding:'0 4px'}} onClick={()=>removeKey(key)}>✕</button>
              )}
            </div>
            <div style={{height:3,background:'var(--bg3)',borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',width:pct+'%',borderRadius:2,
                background:isExhausted?'var(--red)':used>=70?'var(--or)':'var(--green)',
                transition:'width .5s'}}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}


// ── Admin: per-match log row (needs own state so no hook-in-map) ──────────────
function MatchLogRow({match,onCompute,onPullXI,onTestBBB}){
  const[doc,setDoc]=useState(null);
  const[computing,setComputing]=useState(false);
  const[bbbResult,setBbbResult]=useState(null);
  const[testingBBB,setTestingBBB]=useState(false);
  const[rawDoc,setRawDoc]=useState(null);
  const[showRaw,setShowRaw]=useState(false);
  // rawDoc comes from live_scores.xiRawPull — same doc we already subscribe to below
  // So we just read it from doc.xiRawPull in the existing subscription
  const[result,setResult]=useState('');
  useEffect(()=>{
    const unsub=db.collection('live_scores').doc(match.id)
      .onSnapshot(d=>{if(d.exists)setDoc(d.data());else setDoc(null);},()=>{});
    return unsub;
  },[match.id]);
  const fmtIST=(iso)=>{
    if(!iso) return '—';
    try{return new Date(iso).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'});}
    catch{return '—';}
  };
  const now=new Date();
  const lock=new Date(match.lockTime);
  const end=new Date(lock.getTime()+5*3600000);
  const isActive=now>=new Date(lock.getTime()-30*60*1000)&&now<=end;
  const isDone=now>end;
  const isPast=now>lock;
  // Pre-XI window: 35-60 min before lock
  const minToLock=(lock-now)/60000;
  // Pre-XI window: 8-24 min before lock (7:06-7:22 PM for 7:30 game)
  const isPreXI=minToLock>=7&&minToLock<=24;
  const status=doc?.isFinal?'🏁 Final':isActive?'🟢 LIVE':isDone?'✅ Done':isPreXI?'🔔 Pre-match':'⏳ Soon';
  const pollCount=doc?doc.scorePollCount||0:0;
  const lastPoll=doc?doc.lastPollTime:null;
  return(
    <>
    <tr style={{borderBottom:'1px solid var(--border)',fontSize:10}}>
      <td style={{padding:'5px 6px',fontWeight:600,color:'var(--or)',whiteSpace:'nowrap'}}>M{match.num}</td>
      <td style={{padding:'5px 4px',whiteSpace:'nowrap'}}>{match.home} v {match.away}</td>
      <td style={{padding:'5px 4px',whiteSpace:'nowrap',color:'var(--t3)'}}>
        {new Date(match.lockTime).toLocaleDateString('en-IN',{day:'numeric',month:'short',timeZone:'Asia/Kolkata'})}
        {' '}{fmtIST(match.lockTime)}
      </td>
      <td style={{padding:'5px 4px',textAlign:'center'}}>{status}</td>
      <td style={{padding:'5px 4px',textAlign:'center',color:'var(--blue)',fontWeight:600}}>{pollCount}</td>
      <td style={{padding:'5px 4px',color:'var(--t3)',whiteSpace:'nowrap'}}>
        {fmtIST(lastPoll)}
        {doc?.lastBbbPoll&&<div style={{fontSize:8,color:'var(--or)'}}>Dots:{fmtIST(doc.lastBbbPoll)}</div>}
      </td>
      <td style={{padding:'5px 4px',whiteSpace:'nowrap'}}>
        {result&&<span style={{color:result.startsWith('✅')?'var(--green)':result.startsWith('⏳')?'var(--or)':'var(--red)',fontSize:9,marginRight:4}}>{result}</span>}
        {(doc?.xiRawPull||doc?.squadPullTime)&&(
          <button onClick={()=>setShowRaw(s=>!s)} style={{
            background:'none',border:'none',cursor:'pointer',fontSize:9,
            color:showRaw?'var(--cyan)':'var(--t3)',padding:'2px 4px',marginLeft:2
          }}>
            {showRaw?'▲ raw':'▼ raw'}
          </button>
        )}
        {(isPreXI||isActive||!doc?.isFinal)&&now<=new Date(lock.getTime()+2*3600000)&&(
          <button className="btn bsm bghost" disabled={computing} style={{fontSize:9,padding:'3px 7px',
            background:doc?.squadPullTime?'rgba(34,197,94,.15)':'rgba(249,115,22,.15)',
            border:doc?.squadPullTime?'1px solid rgba(34,197,94,.4)':'1px solid rgba(249,115,22,.4)'}}
            onClick={async()=>{
              setComputing(true);setResult('Pulling XI...');
              try{
                await onPullXI(match);
                setResult('✅ XI saved');
                setShowRaw(true); // auto-open raw after pull
              }catch(e){setResult('❌ '+e.message.slice(0,20));}
              setComputing(false);
            }}>
            {computing?<span className="spin"/>:doc?.squadPullTime?'✅ XI':'👥 XI'}
          </button>
        )}
        {/* BBB Test button */}
        <button className="btn bsm bghost" style={{fontSize:9,padding:'3px 6px',marginLeft:2}}
          disabled={testingBBB}
          title="Fetch ball-by-ball data (10 credits) — stores raw response in Firestore for review"
          onClick={async()=>{
            setTestingBBB(true);setBbbResult(null);
            try{
              const r=await onTestBBB(match);
              setBbbResult('✓ Keys:'+r.rawKeys.slice(0,3).join(','));
            }catch(e){setBbbResult('❌ '+(e.message||'').slice(0,25));}
            setTestingBBB(false);
          }}
        >
          {testingBBB?<span className="spin"/>:'📡 BBB'}
        </button>
        {bbbResult&&<span style={{fontSize:8,color:'var(--t3)',marginLeft:2}}>{bbbResult}</span>}
        {isPast&&(
          <button className="btn bsm bor" disabled={computing} style={{fontSize:9,padding:'3px 7px'}}
            onClick={async()=>{
              setComputing(true);setResult('...');
              try{
                const r=await onCompute(match);
                setResult('✅ '+r.players+'p '+r.teams+'t');
              }catch(e){
                const msg=e.message||'Unknown error';

function SeasonBoard({profile}){
  const[rows,setRows]=useState([]);
  const[loading,setLoading]=useState(true);
  const[matchBreakdown,setMatchBreakdown]=useState(null); // which user expanded

  useEffect(()=>{
    const timer=setTimeout(()=>setLoading(false),6000); // safety timeout

    const unsubPts=db.collection('match_pts').onSnapshot(snap=>{
      clearTimeout(timer);
      if(snap.empty){setRows([]);setLoading(false);return;}

      // Group by matchId, then by cvplId (one entry per CVPL team per match)
      const byMatch={};
      snap.forEach(d=>{
        const data=d.data();
        if(!data.matchId) return;
        const teamKey=data.cvplId||data.userId;
        if(!teamKey) return;
        if(!byMatch[data.matchId]) byMatch[data.matchId]={};
        // If duplicate (old uid-keyed + new cvplId-keyed), keep higher pts
        const existing=byMatch[data.matchId][teamKey];
        if(!existing||(data.pts||0)>(existing.pts||0)){
          byMatch[data.matchId][teamKey]=data;
        }
      });

      // Rank per match → assign league pts
      const teamLeague={};
      Object.entries(byMatch).forEach(([matchId,teams])=>{
        const matchDef=SCHEDULE.find(m=>m.id===matchId);
        const mult=matchDef?.mult||1;
        const ranked=Object.entries(teams)
          .sort((a,b)=>(b[1].pts||0)-(a[1].pts||0))
          .map(([teamKey,data],i)=>({teamKey,pts:data.pts||0,rank:i+1,lp:leaguePts(i+1,mult),
            cvplId:data.cvplId||data.userId||teamKey,
            cvplName:data.cvplName||'Unknown',cvplEmoji:data.cvplEmoji||'🏏'}));

        ranked.forEach(r=>{
          const k=r.cvplId||r.teamKey;
          if(!teamLeague[k]) teamLeague[k]={
            uid:k,cvplId:r.cvplId,leaguePts:0,fantasyPts:0,wins:0,matches:0,
            cvplName:r.cvplName,cvplEmoji:r.cvplEmoji,matchDetails:[]
          };
          const u=teamLeague[k];
          u.leaguePts+=r.lp;
          u.fantasyPts=Math.round((u.fantasyPts+r.pts)*10)/10;
          u.matches++;
          if(r.rank===1) u.wins++;
          const label=matchDef?(matchDef.label||matchDef.home+' vs '+matchDef.away):matchId;
          u.matchDetails.push({matchId,rank:r.rank,fantasyPts:r.pts,leaguePts:r.lp,mult,matchLabel:label});
        });
      });

      const sorted=Object.values(teamLeague)
        .sort((a,b)=>b.leaguePts-a.leaguePts||b.fantasyPts-a.fantasyPts)
        .map((r,i)=>({...r,rank:i+1}));
      setRows(sorted);
      setLoading(false);
    },err=>{
      console.warn('SeasonBoard error:',err.message);
      clearTimeout(timer);
      setLoading(false);
    });

    return()=>{unsubPts();clearTimeout(timer);};
  },[]);

  const rc=r=>r===1?'r1':r===2?'r2':r===3?'r3':'';

  return(
    <div className="page scr">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,paddingTop:4}}>
        <div>
          <div className="fd" style={{fontSize:24,color:'var(--or)'}}>SEASON BOARD</div>
          <div style={{fontSize:10,color:'var(--t3)'}}>IPL 2026 · Cricket Veriyars PL</div>
        </div>
        <div style={{fontSize:28}}>🏆</div>
      </div>

      {/* Points system explainer */}
      <div className="card" style={{marginBottom:12,padding:'10px 14px'}}>
        <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>📊 League Points System</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {['🥇 1st = 5pts','🥈 2nd = 4pts','🥉 3rd = 3pts','4th = 2pts','5th = 1pts'].map(t=>(
            <span key={t} className="chip" style={{fontSize:10}}>{t}</span>
          ))}
          <span className="chip b-gold" style={{fontSize:10}}>× match multiplier (WC SF=2× Final=3×)</span>
        </div>
      </div>

      {loading?(
        <div style={{textAlign:'center',padding:32}}><span className="spin"/></div>
      ):rows.length===0?(
        <div className="empty">
          <div style={{fontSize:44}}>🏏</div>
          <div style={{fontWeight:600}}>Season board is empty</div>
          <div style={{fontSize:11,maxWidth:260,textAlign:'center',lineHeight:1.6}}>
            Pick your XI for a match and once points are calculated they'll appear here
          </div>
        </div>
      ):(
        <div>
          {rows.map(row=>{
            const isMe=row.cvplId===profile.cvplId;
            const expanded=matchBreakdown===row.uid;
            return(
              <div key={row.uid}>
                <div className={`lbr ${rc(row.rank)} ${isMe?'me':''}`}
                  style={{cursor:'pointer'}} onClick={()=>setMatchBreakdown(expanded?null:row.uid)}>
                  <div className="lrank" style={{color:row.rank===1?'var(--gold)':row.rank===2?'#9ca3af':row.rank===3?'#cd7f32':'var(--t3)'}}>
                    {row.rank===1?'🥇':row.rank===2?'🥈':row.rank===3?'🥉':row.rank}
                  </div>
                  <div style={{fontSize:18,flexShrink:0}}>{row.cvplEmoji||'🏏'}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:isMe?700:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {row.cvplName}{isMe&&<span style={{fontSize:9,color:'var(--or)',marginLeft:4,fontWeight:800}}>YOU</span>}
                    </div>
                    <div style={{fontSize:10,color:'var(--t3)'}}>{row.matches} matches · {row.wins} 🥇 · {(+(row.fantasyPts||0)).toFixed(0)} fantasy pts</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div className="fm" style={{fontSize:18,fontWeight:800,color:'var(--or)'}}>{row.leaguePts}</div>
                    <div style={{fontSize:9,color:'var(--t3)'}}>league pts {expanded?'▲':'▼'}</div>
                  </div>
                </div>
                {expanded&&(
                  <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'0 0 10px 10px',padding:'10px 14px',marginTop:-4,marginBottom:6}}>
                    <div style={{fontSize:11,fontWeight:700,marginBottom:8,color:'var(--t2)'}}>Match Breakdown</div>
                    {(row.matchDetails||[]).map(md=>(
                      <div key={md.matchId} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid var(--border)',fontSize:11}}>
                        <span style={{color:'var(--t2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:160}}>{md.matchLabel}</span>
                        <div style={{display:'flex',gap:10,flexShrink:0}}>
                          <span style={{color:'var(--t3)'}}>Rank #{md.rank}</span>
                          <span className="fm" style={{color:'var(--blue)'}}>{(+(md.fantasyPts||0)).toFixed(1)}fp</span>
                          <span className="fm" style={{color:'var(--or)',fontWeight:700}}>+{md.leaguePts}lp</span>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
          <div style={{marginTop:12,padding:'10px 12px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:10,fontSize:11,color:'var(--t3)'}}>
            Tap any team to see their match-by-match breakdown
          </div>
        </div>
      )}
      <div style={{height:16}}/>
    </div>
  );
}

        name:newP.name.trim(),role:newP.role,team:newP.team,

      setAdding(false);setNewP({name:'',role:'BAT',team:'RCB'});
    }catch(e){toast(e.message,'e');}
    setSaving(false);

            <select className="inp" value={newP.role} onChange={e=>setNewP(p=>({...p,role:e.target.value}))}>

            <select className="inp" value={newP.team} onChange={e=>setNewP(p=>({...p,team:e.target.value}))}>

          {filtered.map(p=>(

              {editing?.pid===p.pid?(
